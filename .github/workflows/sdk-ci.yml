name: Public SDK CI

on:
  pull_request:
    paths:
      - "sdk/**"
      - "PUBLIC_SDK_BOUNDARY.md"
      - ".github/workflows/sdk-*.yml"
  push:
    branches:
      - main
    paths:
      - "sdk/**"
      - "PUBLIC_SDK_BOUNDARY.md"
      - ".github/workflows/sdk-*.yml"

permissions:
  contents: read

jobs:
  test:
    name: sdk-test-python-${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk/pyproject.toml
      - name: Install SDK
        run: python -m pip install -e "./sdk[dev]"
      - name: Lint
        run: python -m ruff check sdk/src sdk/tests sdk/tools
      - name: Test
        run: python -m pytest sdk/tests -q

  distribution:
    name: sdk-distribution-boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sdk/pyproject.toml
      - name: Install build tools
        run: python -m pip install "build>=1.2,<2" "twine>=5,<7"
      - name: Build
        run: python -m build sdk --outdir sdk/dist
      - name: Validate metadata
        run: python -m twine check sdk/dist/*
      - name: Enforce public boundary
        run: python sdk/tools/verify_artifact_boundary.py sdk/dist/*
      - name: Smoke install wheel
        run: |
          python -m venv /tmp/seam-client-smoke
          /tmp/seam-client-smoke/bin/python -m pip install sdk/dist/*.whl
          /tmp/seam-client-smoke/bin/python -c "from seam_client import SeamClient, AgentMemory; print(SeamClient.__name__, AgentMemory.__name__)"
      - uses: actions/upload-artifact@v4
        with:
          name: seam-client-distributions
          path: sdk/dist/*
          if-no-files-found: error
