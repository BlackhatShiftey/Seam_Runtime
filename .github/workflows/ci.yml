name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions: read-all

jobs:
  test-and-benchmark:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[server]"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run tests
        run: python -m pytest test_seam_all/ tools/history/test_history_tools.py

      - name: Run benchmark suite
        run: python -m seam benchmark run all --output benchmark_bundle.json --format json

      - name: Gate benchmark suite
        run: python -m seam benchmark gate benchmark_bundle.json
