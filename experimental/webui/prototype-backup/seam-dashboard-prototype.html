// ── Syntax-colored line renderer ──────────────────────────────────────────
const S = {
  comment: { color: '#5a7a9a', fontStyle: 'italic' },
  kw: { color: '#9b6cff' },
  def: { color: '#9b6cff' },
  defName: { color: '#7fe0ff' },
  rest: { color: '#bfefff' },
  str: { color: '#7efdb9' },
  decorator: { color: '#f4d676' },
  import: { color: '#9b6cff' },
  plain: { color: '#bfefff' },
  blank: { color: 'transparent' },
  'md-h1': { color: '#a6fcff', fontWeight: 600 },
  'md-h2': { color: '#7fe0ff', fontWeight: 600 }
};

function CodeLine({ line }) {
  if (line.t === 'blank') return <div style={{ height: 8 }} />;
  if (line.t === 'def') return (
    <div>
      <span style={S.kw}>{line.v}</span>
      <span style={S.defName}>{line.name}</span>
      <span style={S.rest}>{line.rest}</span>
    </div>);

  if (line.t === 'kw') return (
    <div><span style={S.kw}>{line.v}</span><span style={S.rest}>{line.rest}</span></div>);

  if (line.t === 'import') return (
    <div><span style={S.import}>{line.v}</span><span style={S.rest}>{line.rest}</span></div>);

  return <div style={S[line.t] || S.plain}>{line.v}</div>;
}

// ── FileTree node ─────────────────────────────────────────────────────────
function FileNode({ node, depth, openFile, activeFile, openFolders, toggleFolder }) {
  const isOpen = openFolders.has(node.id);
  const isActive = activeFile === node.id;

  if (node.type === 'folder') {
    return (
      <div>
        <div
          style={{
            display: 'flex', alignItems: 'center', gap: 5,
            padding: '3px 8px 3px ' + (8 + depth * 14) + 'px',
            cursor: 'pointer', color: '#7fe0ff',
            background: isOpen ? 'rgba(79,140,251,0.06)' : 'transparent',
            userSelect: 'none'
          }}
          onClick={() => toggleFolder(node.id)}>
          
          <span style={{ fontSize: 10, color: '#4f8cfb', width: 10 }}>{isOpen ? '▾' : '▸'}</span>
          <span style={{ fontSize: 11 }}>{node.name}</span>
        </div>
        {isOpen && node.children && node.children.map((child) =>
        <FileNode key={child.id} node={child} depth={depth + 1}
        openFile={openFile} activeFile={activeFile}
        openFolders={openFolders} toggleFolder={toggleFolder} />
        )}
      </div>);

  }

  const extColors = { py: '#9b6cff', svg: '#7fe0ff', html: '#f4d676', md: '#7efdb9', txt: '#bfefff', toml: '#f4d676' };
  const dotColor = extColors[node.lang] || '#bfefff';

  return (
    <div
      style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '3px 8px 3px ' + (20 + depth * 14) + 'px',
        cursor: 'pointer',
        background: isActive ? 'rgba(127,224,255,0.1)' : 'transparent',
        color: isActive ? '#a6fcff' : '#8090b0',
        borderLeft: isActive ? '2px solid #7fe0ff' : '2px solid transparent'
      }}
      onClick={() => openFile(node.id)}>
      
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: dotColor, flexShrink: 0 }} />
      <span style={{ fontSize: 12 }}>{node.name}</span>
    </div>);

}

// ── Terminal line renderer ────────────────────────────────────────────────
function TermLine({ line }) {
  const styles = {
    system: { color: '#274063', fontStyle: 'italic' },
    prompt: { color: '#7fe0ff' },
    ok: { color: '#7efdb9' },
    info: { color: '#9b6cff' },
    warn: { color: '#f4d676' },
    error: { color: '#ff6b6b' },
    plain: { color: '#8090b0' }
  };
  const prefix = line.kind === 'prompt' ? <span style={{ color: '#4f8cfb' }}>❯ </span> : null;
  return (
    <div style={{ ...styles[line.kind], lineHeight: 1.6, padding: '1px 0' }}>
      {prefix}{line.text}
    </div>);

}

// ── Agent message renderer ────────────────────────────────────────────────
function AgentMsg({ msg }) {
  if (msg.role === 'system') return (
    <div style={{ color: '#274063', fontSize: 11, fontStyle: 'italic', marginBottom: 4 }}>
      {msg.text}
    </div>);

  const isUser = msg.role === 'user';
  return (
    <div style={{
      marginBottom: 14,
      display: 'flex', flexDirection: 'column',
      alignItems: isUser ? 'flex-end' : 'flex-start'
    }}>
      <div style={{
        fontSize: 10, color: '#4f8cfb', marginBottom: 3,
        textTransform: 'uppercase', letterSpacing: '0.08em',
        textAlign: isUser ? 'right' : 'left'
      }}>
        {isUser ? 'You' : 'SEAM Agent'}
      </div>
      <div style={{
        maxWidth: '90%',
        background: isUser ? 'rgba(79,140,251,0.15)' : 'rgba(8,19,42,0.9)',
        border: isUser ? '1px solid rgba(79,140,251,0.3)' : '1px solid rgba(127,224,255,0.12)',
        borderRadius: isUser ? '10px 10px 2px 10px' : '10px 10px 10px 2px',
        padding: '8px 12px',
        fontSize: 12.5,
        color: isUser ? '#a6fcff' : '#bfefff',
        lineHeight: 1.6,
        whiteSpace: 'pre-wrap'
      }}>
        {msg.text}
      </div>
    </div>);

}

function FsNode({ node, depth, openFolders, toggleFolder }) {
  const isOpen = openFolders.has(node.id);
  if (node.type === 'folder') {
    return (
      <div>
        <div onClick={() => toggleFolder(node.id)} style={{
          display: 'flex', alignItems: 'center', gap: 5,
          padding: `3px 8px 3px ${8 + depth * 14}px`,
          cursor: 'pointer', color: '#7fe0ff', userSelect: 'none',
          background: isOpen ? 'rgba(79,140,251,0.05)' : 'transparent'
        }}>
          <span style={{ fontSize: 10, color: '#4f8cfb', width: 10 }}>{isOpen ? '▾' : '▸'}</span>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" stroke="#4f8cfb" strokeWidth="1.5" />
          </svg>
          <span style={{ fontSize: 11 }}>{node.name}</span>
        </div>
        {isOpen && node.children && node.children.map((c) =>
        <FsNode key={c.id} node={c} depth={depth + 1} openFolders={openFolders} toggleFolder={toggleFolder} />
        )}
      </div>);

  }
  const isDb = node.type === 'dbfile';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 6,
      padding: `3px 8px 3px ${20 + depth * 14}px`,
      color: isDb ? '#f4d676' : '#8090b0', fontSize: 12
    }}>

      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="6" rx="8" ry="3" stroke="#f4d676" strokeWidth="1.5" /><path d="M4 6v6c0 1.657 3.582 3 8 3s8-1.343 8-3V6" stroke="#f4d676" strokeWidth="1.5" /><path d="M4 12v6c0 1.657 3.582 3 8 3s8-1.343 8-3v-6" stroke="#f4d676" strokeWidth="1.5" /></svg> :

      }
      <span>{node.name}</span>
      {node.size && <span style={{ marginLeft: 'auto', color: '#274063', fontSize: 10 }}>{node.size}</span>}

    setAutoLog(prev => [...prev, { t: new Date().toLocaleTimeString('en-US',{hour12:false}), msg: `Auto-ingest active — watching ${watchPath}`, kind: 'info' }]);
    autoRef.current = setInterval(() => {
      // Simulate agent finding and auto-ingesting data
      const actions = [
        'Agent retrieved 3 new MIRL records from context — auto-persisting',
        'New file detected: agent_output.json — queuing for ingest',
        'Vector index sync triggered — 12 new embeddings',
        'Memory consolidation: 4 duplicate records merged',
        'Auto-ingest: clm:51–clm:56 persisted to SQLite',
      ];
      const msg = actions[Math.floor(Math.random() * actions.length)];
      setAutoLog(prev => [...prev.slice(-19), { t: new Date().toLocaleTimeString('en-US',{hour12:false}), msg, kind: 'ok' }]);
      // Occasionally mark a queued file as running then done
      setFiles(prev => {
        const queued = prev.find(f => f.status === 'queued');
        if (queued) return prev.map(f => f.id === queued.id ? { ...f, status: 'running', stage: 1 } : f);
        const running = prev.find(f => f.status === 'running');
        if (running) return prev.map(f => f.id === running.id ? { ...f, status: 'done', stage: 5, records: Math.floor(Math.random()*20)+5 } : f);
        return prev;
      });
    }, 2200);
    return () => clearInterval(autoRef.current);

  const runAll = () => setFiles(prev => prev.map(f => f.status === 'queued' ? { ...f, status: 'running', stage: 1 } : f));

  const totalRecords = files.reduce((s, f) => s + f.records, 0);

function ProvenanceGraph({ nodes, edges, highlight, onHover }) {
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
  return (
    <svg width="100%" height="220" viewBox="0 0 640 220" style={{ display: 'block' }}>
      <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#1a2540" />
        </marker>
      </defs>
      {/* edges */}
      {edges.map((e, i) => {
        const a = nodeMap[e.from], b = nodeMap[e.to];
        if (!a || !b) return null;
        const isHot = highlight === e.from || highlight === e.to;
        return (
          <line key={i}
            x1={a.x} y1={a.y} x2={b.x} y2={b.y}
            stroke={isHot ? '#4f8cfb' : '#1a2540'}
            strokeWidth={isHot ? 1.5 : 1}
            strokeOpacity={isHot ? 0.8 : 0.4}
            markerEnd="url(#arrow)"
          />
        );
      })}
      {/* nodes */}
      {nodes.map(n => {
        const isHot = highlight === n.id;
        return (
          <g key={n.id} onMouseEnter={() => onHover(n.id)} onMouseLeave={() => onHover(null)} style={{ cursor: 'pointer' }}>
            <circle cx={n.x} cy={n.y} r={isHot ? 22 : 18}
              fill={isHot ? n.color + '22' : '#08132a'}
              stroke={n.color}
              strokeWidth={isHot ? 2 : 1}
              style={{ filter: isHot ? `drop-shadow(0 0 6px ${n.color})` : 'none', transition: 'all 0.15s' }}
            />
            <text x={n.x} y={n.y + 1} textAnchor="middle" dominantBaseline="middle"
              fontSize="8" fill={n.color} fontFamily="JetBrains Mono, monospace" fontWeight="500">
              {n.label.length > 10 ? n.label.slice(0, 10) + '…' : n.label}
            </text>
            <text x={n.x} y={n.y + 30} textAnchor="middle" fontSize="7" fill="#274063" fontFamily="JetBrains Mono, monospace">
              {n.type}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function SparkLine({ data, color, width = 120, height = 32 }) {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts.split(' ').pop().split(',')[0]} cy={pts.split(' ').pop().split(',')[1]} r="2.5" fill={color} />
    </svg>
  );
}

function CyberBarChart({ data, color, maxVal }) {
  return (
    <svg width="100%" height="120" viewBox={`0 0 ${data.length * 36} 120`} preserveAspectRatio="none" style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`grad-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.9"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.1"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      {data.map((v, i) => {
        const h = (v / maxVal) * 100;
        const x = i * 36 + 4;
        return (
          <g key={i} filter="url(#glow)">
            <rect x={x} y={120 - h} width={28} height={h}
              fill={`url(#grad-${color.replace('#','')})`}
              stroke={color} strokeWidth="1" rx="2"/>
            <line x1={x} y1={120-h} x2={x+28} y2={120-h} stroke={color} strokeWidth="1.5" opacity="0.8"/>
          </g>
        );
      })}
    </svg>
  );
}

function CyberSparkFull({ data, color, width=300, height=60 }) {
  const min = Math.min(...data), max = Math.max(...data), range = max-min || 1;
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1))*(width-8)+4;
    const y = height - ((v-min)/range)*(height-12) - 6;
    return `${x},${y}`;
  }).join(' ');
  const areaBottom = height;
  const firstPt = pts.split(' ')[0];
  const lastPt = pts.split(' ').pop();
  const [lx] = lastPt.split(',');
  const [fx] = firstPt.split(',');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display:'block', overflow:'visible' }}>
      <defs>
        <linearGradient id={`sparkfill-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
        <filter id="sparkglow">
          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <polygon points={`${pts} ${lx},${areaBottom} ${fx},${areaBottom}`}
        fill={`url(#sparkfill-${color.replace('#','')})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2"
        strokeLinejoin="round" strokeLinecap="round" filter="url(#sparkglow)"/>
      {data.map((v,i) => {
        const x = (i/(data.length-1))*(width-8)+4;
        const y = height - ((v-min)/range)*(height-12) - 6;
        return <circle key={i} cx={x} cy={y} r={i===data.length-1?3.5:1.5} fill={color} opacity={i===data.length-1?1:0.4}/>;
      })}
    </svg>
  );
}

              <div style={{ position:'absolute', inset:0, background:'repeating-linear-gradient(to bottom, rgba(255,255,255,0.012) 0, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 4px)', pointerEvents:'none' }}/>
              {/* Big provenance graph */}
              <svg width="100%" height="340" viewBox="0 0 900 340" style={{ display:'block', overflow:'visible' }}>
                <defs>
                  <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                    <path d="M0,0 L0,6 L8,3 z" fill="#274063"/>
                  </marker>
                  <filter id="nodeglow">
                    <feGaussianBlur stdDeviation="3" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                </defs>
                {/* Grid lines */}
                {[0,1,2,3,4,5,6,7,8].map(i=>(
                  <line key={`v${i}`} x1={i*112.5} y1={0} x2={i*112.5} y2={340} stroke="#0d1f3c" strokeWidth="1"/>
                ))}
                {[0,1,2,3,4].map(i=>(
                  <line key={`h${i}`} x1={0} y1={i*85} x2={900} y2={i*85} stroke="#0d1f3c" strokeWidth="1"/>
                ))}
                {/* Scale nodes for full view */}
                {provenanceEdges.map((e,i) => {
                  const scale = 1.6;
                  const a = provenanceNodes.find(n=>n.id===e.from);
                  const b = provenanceNodes.find(n=>n.id===e.to);
                  if (!a||!b) return null;
                  const ax=a.x*scale, ay=a.y*scale+20, bx=b.x*scale, by=b.y*scale+20;
                  const isHot = hoveredNode===e.from||hoveredNode===e.to;
                  return (
                    <line key={i} x1={ax} y1={ay} x2={bx} y2={by}
                      stroke={isHot?'#4f8cfb':'#1a2540'} strokeWidth={isHot?2:1}
                      strokeOpacity={isHot?0.9:0.5} markerEnd="url(#arrow2)"
                      style={{transition:'stroke 0.2s'}}/>
                  );
                })}
                {provenanceNodes.map(n => {
                  const scale=1.6;
                  const cx=n.x*scale, cy=n.y*scale+20;
                  const isHot=hoveredNode===n.id;
                  const pulse = isHot ? 1 + Math.sin(tick*0.8)*0.08 : 1;
                  return (
                    <g key={n.id} onMouseEnter={()=>setHoveredNode(n.id)} onMouseLeave={()=>setHoveredNode(null)} style={{cursor:'pointer'}}>
                      {isHot && <circle cx={cx} cy={cy} r={36*pulse} fill="none" stroke={n.color} strokeWidth="1" opacity="0.15"/>}
                      <circle cx={cx} cy={cy} r={isHot?28:22}
                        fill={isHot?n.color+'22':'#08132a'}
                        stroke={n.color} strokeWidth={isHot?2:1.5}
                        filter={isHot?'url(#nodeglow)':'none'}
                        style={{transition:'all 0.15s'}}/>
                      <text x={cx} y={cy-2} textAnchor="middle" dominantBaseline="middle"
                        fontSize="9" fill={n.color} fontFamily="JetBrains Mono, monospace" fontWeight="600">
                        {n.label.length>11?n.label.slice(0,11)+'…':n.label}
                      </text>
                      <text x={cx} y={cy+10} textAnchor="middle" fontSize="7" fill="#274063" fontFamily="JetBrains Mono, monospace">
                        {n.type}
                      </text>
                      {isHot && (
                        <text x={cx} y={cy+42} textAnchor="middle" fontSize="8" fill={n.color} fontFamily="JetBrains Mono, monospace">
                          {provenanceEdges.filter(e=>e.from===n.id||e.to===n.id).length} edges
                        </text>
                      )}
                    </g>
                  );
                })}
              </svg>
            </div>
            {/* Legend */}
            <div style={{ display:'flex', gap:16, marginTop:14, flexWrap:'wrap' }}>
              {[['@','entity','#a6fcff'],['#','claim','#7fe0ff'],['!','event','#f4d676'],['>','relation','#9b6cff'],['~','state','#7efdb9'],['^','evidence','#d391ff'],['%','source','#66b8ff']].map(([tag,kind,color])=>(
                <div key={tag} style={{ display:'flex', alignItems:'center', gap:5 }}>
                  <span style={{ width:8, height:8, borderRadius:'50%', background:color, boxShadow:`0 0 5px ${color}` }}/>
                  <span style={{ fontSize:10, color:'#8090b0' }}><span style={{ color, fontWeight:700 }}>{tag}</span> {kind}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── Records ── */}
        {tab === 'records' && (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))', gap:12 }}>
            {memoryRecords.map(r => (
              <div key={r.id} style={{ background:'rgba(8,19,42,0.9)', border:'1px solid rgba(47,99,255,0.12)', borderRadius:10, padding:'12px 14px',
                borderLeft:`3px solid ${tagColors[r.tag]||'#7fe0ff'}` }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
                  <span style={{ fontSize:14, color:tagColors[r.tag], fontWeight:700, filter:`drop-shadow(0 0 4px ${tagColors[r.tag]})` }}>{r.tag}</span>
                  <span style={{ fontSize:10, color:'#4f8cfb' }}>{r.id}</span>
                  <div style={{ flex:1 }}/>
                  <span style={{ fontSize:10, color:'#7efdb9', fontWeight:500 }}>{(r.score*100).toFixed(0)}%</span>
                  <span style={{ fontSize:9, color:'#274063' }}>{r.age}</span>
                </div>
                <div style={{ fontSize:12, color:'#bfefff', lineHeight:1.5, marginBottom:8 }}>{r.text}</div>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  <div style={{ flex:1, height:3, background:'#1a2540', borderRadius:2 }}>
                    <div style={{ height:'100%', width:`${r.score*100}%`, background:tagColors[r.tag]||'#7fe0ff', borderRadius:2, boxShadow:`0 0 5px ${tagColors[r.tag]}` }}/>
                  </div>
                  <span style={{ fontSize:9, color:'#274063' }}>{r.kind}</span>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── Write Queue ── */}
        {tab === 'write queue' && (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {writeQueue.map((w,i) => {
              const liveP = w.status==='writing' ? Math.min(1, w.progress+((tick*0.03)%(1-w.progress))) : w.progress;
              return (
                <div key={w.id} style={{ background:'rgba(8,19,42,0.9)', border:`1px solid ${w.status==='writing'?'rgba(127,224,255,0.2)':'rgba(47,99,255,0.1)'}`, borderRadius:10, padding:'14px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
                    <span style={{ fontSize:9, padding:'2px 7px', borderRadius:4, background:w.status==='writing'?'rgba(127,224,255,0.1)':'rgba(39,64,99,0.3)', color:w.status==='writing'?'#7fe0ff':'#274063', letterSpacing:'0.06em' }}>{w.op}</span>
                    <span style={{ fontSize:10, color:w.status==='writing'?'#7efdb9':'#274063' }}>{w.status==='writing'?'● writing':'○ queued'}</span>
                    <div style={{ flex:1 }}/>
                    <span style={{ fontSize:10, color:'#4f8cfb' }}>{w.id}</span>
                  </div>
                  <div style={{ fontSize:12, color:'#8090b0', marginBottom:10, lineHeight:1.5 }}>{w.text}</div>
                  <div style={{ height:5, background:'#1a2540', borderRadius:3 }}>
                    <div style={{ height:'100%', width:`${liveP*100}%`, background:w.status==='writing'?'linear-gradient(90deg,#7fe0ff,#7efdb9)':'#274063', borderRadius:3, transition:'width 0.6s ease', boxShadow:w.status==='writing'?'0 0 8px #7fe0ff80':'none' }}/>
                  </div>
                  {w.status==='writing' && <div style={{ fontSize:10, color:'#7fe0ff', marginTop:4, textAlign:'right' }}>{(liveP*100).toFixed(0)}%</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* ── Stats ── */}
        {tab === 'stats' && (
          <div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:12, marginBottom:24 }}>
              {[
                {label:'Memory records stored',value:'1,412,048',color:'#7fe0ff'},
                {label:'Indexed today',value:'2,847',color:'#7efdb9'},
                {label:'Pending write queue',value:'5',color:'#f4d676'},
                {label:'Graph edges',value:'841,203',color:'#9b6cff'},
                {label:'Avg retrieval latency',value:'38 ms',color:'#7efdb9'},
                {label:'Last compaction',value:'03:00 UTC',color:'#66b8ff'},
                {label:'Vector drift',value:'0.8%',color:'#7efdb9'},
                {label:'Contradiction flags',value:'3 active',color:'#f4d676'},
              ].map(s=>(
                <div key={s.label} style={{ background:'rgba(8,19,42,0.9)', border:'1px solid rgba(47,99,255,0.12)', borderRadius:10, padding:'14px 16px' }}>
                  <div style={{ fontSize:10, color:'#4f6888', marginBottom:6, lineHeight:1.4 }}>{s.label}</div>
                  <div style={{ fontSize:22, color:s.color, fontWeight:600, filter:`drop-shadow(0 0 6px ${s.color})` }}>{s.value}</div>
                </div>
              ))}
            </div>
            <div style={{ fontSize:10, color:'#274063', textTransform:'uppercase', letterSpacing:'0.09em', marginBottom:12 }}>Retrieval mode breakdown</div>
            <div style={{ background:'rgba(8,19,42,0.9)', border:'1px solid rgba(47,99,255,0.12)', borderRadius:10, padding:'16px' }}>
              {[
                {mode:'vector',pct:0.68,color:'#9b6cff',ops:'1.1k ops/s'},
                {mode:'graph',pct:0.21,color:'#7fe0ff',ops:'320 ops/s'},
                {mode:'lexical',pct:0.08,color:'#f4d676',ops:'130 ops/s'},
                {mode:'mix',pct:0.03,color:'#7efdb9',ops:'48 ops/s'},
              ].map(r=>(
                <div key={r.mode} style={{ marginBottom:12 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, marginBottom:4 }}>
                    <span style={{ color:r.color, fontWeight:500 }}>{r.mode}</span>
                    <span style={{ color:'#5a7a9a' }}>{r.ops} · {(r.pct*100).toFixed(0)}%</span>
                  </div>
                  <div style={{ height:6, background:'#1a2540', borderRadius:3 }}>
                    <div style={{ height:'100%', width:`${r.pct*100}%`, background:r.color, borderRadius:3, boxShadow:`0 0 6px ${r.color}80` }}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────
function App() {
  const { TweaksPanel, useTweaks } = window;

  const TWEAK_DEFAULS = /*EDITMODE-BEGIN*/{
    "accentColor": "#7fe0ff",
    "terminalHeight": 200,
    "explorerWidth": 240,
    "agentWidth": 300,
    "showMetrics": true
  } /*EDITMODE-END*/;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULS);

  // Panel state
  const [explorerOpen, setExplorerOpen] = useState(true);
  const [terminalOpen, setTerminalOpen] = useState(true);
  const [agentOpen, setAgentOpen] = useState(true);
  const [memoryOpen, setMemoryOpen] = useState(false);
  const [ingestOpen, setIngestOpen] = useState(false);
  const [benchmarkOpen, setBenchmarkOpen] = useState(false);
  const [activeNav, setActiveNav] = useState('explorer');
  const [settingsOpen, setSettingsOpen] = useState(false);

  // Explorer sub-tab: 'project' | 'system'
  const [explorerTab, setExplorerTab] = useState('project');
  const [sysFolders, setSysFolders] = useState(new Set(['home']));

  // File tabs
  const [openTabs, setOpenTabs] = useState(['cli', 'dashboard', 'readme']);
  const [activeTab, setActiveTab] = useState('cli');
  const [activeFile, setActiveFile] = useState('cli');

  // File explorer
  const [openFolders, setOpenFolders] = useState(new Set(['seam_runtime', 'branding']));

  // Terminal
  const [termLines, setTermLines] = useState(initialTermLines);
  const [termInput, setTermInput] = useState('');
  const [termMenuOpen, setTermMenuOpen] = useState(false);
  const termEnd = useRef(null);
  const termInputRef = useRef(null);

  // Agent
  const [agentMessages, setAgentMessages] = useState(initialAgentMessages);
  const [agentInput, setAgentInput] = useState('');
  const [agentLoading, setAgentLoading] = useState(false);
  const [modelMenuOpen, setModelMenuOpen] = useState(false);
  const [selectedModel, setSelectedModel] = useState(MODEL_OPTIONS[0]);
  const agentEnd = useRef(null);

  useEffect(() => {
    if (termEnd.current) termEnd.current.parentElement.scrollTop = termEnd.current.parentElement.scrollHeight;
  }, [termLines]);
  useEffect(() => {
    if (agentEnd.current) agentEnd.current.parentElement.scrollTop = agentEnd.current.parentElement.scrollHeight;
  }, [agentMessages]);

  const openFile = useCallback((id) => {
    setActiveFile(id);
    setOpenTabs((prev) => prev.includes(id) ? prev : [...prev, id]);
    setActiveTab(id);
  }, []);

  const closeTab = useCallback((id, e) => {
    e.stopPropagation();
    setOpenTabs((prev) => {
      const next = prev.filter((t) => t !== id);
      if (activeTab === id && next.length > 0) setActiveTab(next[next.length - 1]);
      return next;
    });
  }, [activeTab]);

  const toggleFolder = useCallback((id) => {
    setOpenFolders((prev) => {const n = new Set(prev);n.has(id) ? n.delete(id) : n.add(id);return n;});
  }, []);
  const toggleSysFolder = useCallback((id) => {
    setSysFolders((prev) => {const n = new Set(prev);n.has(id) ? n.delete(id) : n.add(id);return n;});
  }, []);

  const navItems = [
  { id: 'explorer', icon: icons.explorer,  label: 'Editor' },
  { id: 'ingest',   icon: icons.ingest,    label: 'Ingest' },
  { id: 'memory',   icon: icons.memory,    label: 'Memory' },
  { id: 'agent',    icon: icons.agent,     label: 'Agent' },
  { id: 'benchmark',icon: icons.benchmark, label: 'Benchmarks' }];


  // ── Terminal submit with /, ! and ? prefixes ───────────────────────────
  const handleTermSubmit = (e) => {
    e.preventDefault();
    const raw = termInput.trim();
    if (!raw) return;
    const id = termLines.length;
    const addLines = (...ls) => setTermLines((prev) => [...prev, ...ls.map((l, i) => ({ id: prev.length + i, ...l }))]);

    if (raw === '/') {
      setTermMenuOpen(true);
      setTermInput('');
      return;
    }
    if (raw.startsWith('/')) {
      const cmd = raw.slice(1).trim();
      addLines(
        { kind: 'prompt', text: raw },
        { kind: 'info', text: `[menu] executing: seam ${cmd}` },
        { kind: 'ok', text: `[ok] seam ${cmd} — done` }
      );
    } else if (raw.startsWith('!')) {
      const bash = raw.slice(1).trim();
      addLines(
        { kind: 'prompt', text: raw },
        { kind: 'plain', text: `$ ${bash}` },
        { kind: 'ok', text: `[bash] executed: ${bash}` }
      );
    } else if (raw === '?') {
      addLines(
        { kind: 'prompt', text: raw },
        { kind: 'info', text: '  /         — open SEAM command menu' },
        { kind: 'info', text: '  /ingest   — ingest a file into MIRL' },
        { kind: 'info', text: '  /retrieve — retrieve context from store' },
        { kind: 'info', text: '  /search   — search memory records' },
        { kind: 'info', text: '  /doctor   — run health check' },
        { kind: 'info', text: '  !<cmd>    — run a raw bash command' },
        { kind: 'info', text: '  ?         — show this help' }
      );
    } else {
      addLines(
        { kind: 'prompt', text: raw },
        { kind: 'info', text: `[seam] ${raw}...` }
      );
    }
    setTermInput('');
  };

  const termMenuCommands = [
  { cmd: '/ingest', desc: 'Ingest a file into MIRL memory' },
  { cmd: '/retrieve', desc: 'Retrieve context from the store' },
  { cmd: '/search', desc: 'Search memory records' },
  { cmd: '/doctor', desc: 'Run health check' },
  { cmd: '/index', desc: 'Rebuild vector index' },
  { cmd: '/dashboard', desc: 'Open Textual dashboard' },
  { cmd: '/serve', desc: 'Start REST API server' },
  { cmd: '/benchmark', desc: 'Run benchmark suite' }];


  // ── Agent submit ──────────────────────────────────────────────────────
  const handleAgentSubmit = async (e) => {
    e.preventDefault();
    if (!agentInput.trim() || agentLoading) return;
    const userMsg = { id: agentMessages.length, role: 'user', text: agentInput };
    setAgentMessages((prev) => [...prev, userMsg]);
    setAgentInput('');
    setAgentLoading(true);
    try {
      const systemPrompt = `You are the SEAM Agent — an AI assistant embedded in the SEAM dashboard. SEAM is a local memory persistence runtime for AI agents using SQLite, vector search, graph traversal, and temporal signals. Be concise, technical, and helpful. Format responses with bullet points when listing things. Current model: ${selectedModel.label} (${selectedModel.provider}).`;
      const resp = await window.claude.complete({
        messages: [{ role: 'user', content: systemPrompt + '\n\nUser: ' + agentInput }]
      });
      setAgentMessages((prev) => [...prev, { id: prev.length, role: 'assistant', text: resp }]);
    } catch {
      setAgentMessages((prev) => [...prev, { id: prev.length, role: 'assistant', text: '[error] Could not reach agent. Check your connection.' }]);
    }
    setAgentLoading(false);
  };

  const currentContent = editorContent[activeTab] || editorContent.cli;

  const handleNavClick = (id) => {
    if (id === 'agent') { setAgentOpen(v => !v); setActiveNav('agent'); return; }
    if (id === 'memory') { setOpenTabs(prev => prev.includes('__memory') ? prev : [...prev, '__memory']); setActiveTab('__memory'); setActiveFile('__memory'); setMemoryOpen(false); setIngestOpen(false); setExplorerOpen(false); setBenchmarkOpen(false); setActiveNav('memory'); return; }
    if (id === 'ingest') { setIngestOpen(v => !v); setMemoryOpen(false); setExplorerOpen(false); setBenchmarkOpen(false); setActiveNav('ingest'); return; }
    if (id === 'explorer') { setExplorerOpen(v => !v); setMemoryOpen(false); setIngestOpen(false); setBenchmarkOpen(false); setActiveNav('explorer'); return; }
    if (id === 'benchmark') { setOpenTabs(prev => prev.includes('__benchmarks') ? prev : [...prev, '__benchmarks']); setActiveTab('__benchmarks'); setActiveFile('__benchmarks'); setBenchmarkOpen(false); setMemoryOpen(false); setIngestOpen(false); setExplorerOpen(false); setActiveNav('benchmark'); return; }
    if (id === activeNav && explorerOpen) {setExplorerOpen(false);} else
    {setActiveNav(id);setExplorerOpen(true);}
  };

  const explorerWidth  = explorerOpen  ? tweaks.explorerWidth : 0;
  const memoryWidth    = memoryOpen    ? tweaks.explorerWidth : 0;
  const ingestWidth    = ingestOpen    ? tweaks.explorerWidth : 0;
  const benchmarkWidth = benchmarkOpen ? tweaks.explorerWidth : 0;
  const agentWidth     = agentOpen     ? tweaks.agentWidth    : 0;
  const termHeight     = terminalOpen  ? tweaks.terminalHeight : 0;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: 'var(--bg-deep)', position: 'relative' }}>

      {/* ── Title bar ─────────────────────────────────────────────────── */}
      <div style={{
        height: 44, background: '#020915',
        borderBottom: '1px solid rgba(47,99,255,0.2)',
        display: 'flex', alignItems: 'center',
        padding: '0 14px', gap: 0, flexShrink: 0,
        userSelect: 'none'
      }}>
        {/* Logo + identity block */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginRight: 20 }}>
          <SeamMark size={22} />
          <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1.2 }}>
            <span style={{ color: '#a6fcff', fontSize: 13, letterSpacing: '0.14em', fontWeight: 600, textTransform: 'uppercase', fontFamily: "Permanent Marker" }}>SEAM</span>
            <span style={{ color: '#274063', fontSize: 9, letterSpacing: '0.1em', textTransform: 'uppercase' }}>v0.1.0 · MIRL Runtime</span>
          </div>
        </div>

        {/* Divider */}
        <div style={{ width: 1, height: 22, background: 'rgba(47,99,255,0.2)', marginRight: 16 }} />

        {/* Live status pills */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {[
          { dot: '#7efdb9', label: 'SQLite', sub: '2.2 GB' },
          { dot: '#7efdb9', label: 'Vector index', sub: '99.2%' },
          { dot: '#7efdb9', label: 'MIRL', sub: 'connected' },
          { dot: '#f4d676', label: 'REST API', sub: ':8765' }].
          map((p) =>
          <div key={p.label} style={{
            display: 'flex', alignItems: 'center', gap: 5,
            padding: '2px 8px', borderRadius: 4,
            background: 'rgba(255,255,255,0.03)',
            border: '1px solid rgba(47,99,255,0.12)',
            fontSize: 10, color: '#8090b0'
          }}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: p.dot, boxShadow: `0 0 5px ${p.dot}`, flexShrink: 0 }} />
              <span style={{ color: '#7090a0' }}>{p.label}</span>
              <span style={{ color: p.dot, fontWeight: 500 }}>{p.sub}</span>
            </div>
          )}
        </div>

        <div style={{ flex: 1 }} />
        {/* macOS dots */}
        <div style={{ display: 'flex', gap: 6, justifyContent: "flex-start" }}>
          {['#ff6b6b', '#f4d676', '#7efdb9'].map((c, i) =>
          <div key={i} style={{ width: 12, height: 12, borderRadius: '50%', background: c, opacity: 0.7 }} />
          )}
        </div>
      </div>

      {/* ── Body ──────────────────────────────────────────────────────── */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative' }}>

        {/* Settings overlay */}
        {settingsOpen && <SettingsPanel onClose={() => setSettingsOpen(false)} onOpenFile={(tabId) => { openFile(tabId); setSettingsOpen(false); }} />}

        {/* ── Activity bar ───────────────────────────────────────────── */}
        <div style={{
          width: 48, background: '#020913', flexShrink: 0,
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          borderRight: '1px solid rgba(47,99,255,0.15)', paddingTop: 6
        }}>
          {navItems.map((item) =>
          <button key={item.id} title={item.label} onClick={() => handleNavClick(item.id)}
          style={{
            width: 40, height: 40, display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: activeNav === item.id && explorerOpen ? 'var(--cyan)' : 'var(--muted)',
            borderLeft: activeNav === item.id && explorerOpen ? '2px solid var(--cyan)' : '2px solid transparent',
            transition: 'color 0.15s, border-color 0.15s', margin: '2px 0', borderRadius: 0
          }}
          onMouseEnter={(e) => e.currentTarget.style.color = 'var(--ice)'}
          onMouseLeave={(e) => e.currentTarget.style.color = activeNav === item.id && explorerOpen ? 'var(--cyan)' : 'var(--muted)'}>
            {item.icon}</button>
          )}
          <div style={{ flex: 1 }} />
          <button title="Settings" onClick={() => setSettingsOpen(true)}
          style={{
            width: 40, height: 40, display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: settingsOpen ? 'var(--cyan)' : 'var(--muted)', marginBottom: 6,
            borderLeft: settingsOpen ? '2px solid var(--cyan)' : '2px solid transparent'
          }}>
            {icons.settings}</button>
        </div>

        {/* ── Explorer panel ─────────────────────────────────────────── */}
        <div style={{
          width: explorerWidth, flexShrink: 0, overflow: 'hidden',
          transition: 'width 0.22s cubic-bezier(0.4,0,0.2,1)',
          background: '#030d20', borderRight: explorerOpen ? '1px solid rgba(47,99,255,0.15)' : 'none',
          display: 'flex', flexDirection: 'column'
        }}>
          {explorerOpen &&
          <>
              {/* Header */}
              <div style={{
              padding: '7px 12px 0', fontSize: 10, textTransform: 'uppercase',
              letterSpacing: '0.12em', color: '#4f8cfb',
              borderBottom: '1px solid rgba(47,99,255,0.1)',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between'
            }}>
                <span>Explorer</span>
                <span style={{ color: '#274063', cursor: 'pointer', fontSize: 14 }} onClick={() => setExplorerOpen(false)}>×</span>
              </div>
              {/* Sub-tabs: Project / System */}
              <div style={{ display: 'flex', borderBottom: '1px solid rgba(47,99,255,0.1)', flexShrink: 0 }}>
                {['project', 'system'].map((t) =>
              <div key={t} onClick={() => setExplorerTab(t)} style={{
                flex: 1, textAlign: 'center', padding: '5px 0', fontSize: 10,
                textTransform: 'uppercase', letterSpacing: '0.08em', cursor: 'pointer',
                color: explorerTab === t ? '#7fe0ff' : '#274063',
                borderBottom: explorerTab === t ? '2px solid #7fe0ff' : '2px solid transparent'
              }}>{t}</div>
              )}
              </div>

              {tweaks.showMetrics && explorerTab === 'project' && <MetricsPanel />}

              <div style={{ overflowY: 'auto', flex: 1, paddingTop: 4 }}>
                {explorerTab === 'project' ?
              <>
                    <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#274063', padding: '4px 12px' }}>Seam /</div>
                    {fileTree.map((node) =>
                <FileNode key={node.id} node={node} depth={0}
                openFile={openFile} activeFile={activeFile}
                openFolders={openFolders} toggleFolder={toggleFolder} />
                )}
                  </> :

              <>
                    <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#274063', padding: '4px 12px 6px' }}>File System</div>
                    {systemPaths.map((node) =>
                <FsNode key={node.id} node={node} depth={0} openFolders={sysFolders} toggleFolder={toggleSysFolder} />
                )}
                  </>
              }
              </div>
            </>
          }
        </div>

        {/* ── Memory panel ───────────────────────────────────────────── */}
        <MemoryPanel width={memoryWidth} />

        {/* ── Ingest panel ───────────────────────────────────────────── */}
        <IngestPanel width={ingestWidth} onOpenSettings={(section) => { setSettingsOpen(true); }} />

        {/* ── Benchmark panel ────────────────────────────────────────── */}
        <BenchmarkPanel width={benchmarkWidth} />

        {/* ── Main content area ──────────────────────────────────────── */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>

          {/* Tab bar */}
          <div style={{
            height: 36, background: '#020913',
            borderBottom: '1px solid rgba(47,99,255,0.15)',
            display: 'flex', alignItems: 'stretch', overflowX: 'auto', flexShrink: 0
          }}>
            {openTabs.map((tabId) => {
              const isSpecial = tabId === '__benchmarks' || tabId === '__memory';
              const content = editorContent[tabId];
              const isActive = tabId === activeTab;
              const extColors = { py: '#9b6cff', svg: '#7fe0ff', html: '#f4d676', md: '#7efdb9', txt: '#bfefff' };
              const ext = content?.name?.split('.').pop();
              const specialMeta = {
                '__benchmarks': { name: 'Benchmarks', dot: '#f4d676' },
                '__memory':     { name: 'Memory',     dot: '#9b6cff' },
              };
              const tabName = isSpecial ? specialMeta[tabId].name : content?.name;
              const tabDot  = isSpecial ? specialMeta[tabId].dot  : (extColors[ext] || '#5a7a9a');
              return (
                <div key={tabId} onClick={() => {setActiveTab(tabId);setActiveFile(tabId);}} style={{
                  display: 'flex', alignItems: 'center', gap: 6, padding: '0 12px',
                  background: isActive ? 'var(--bg-panel)' : 'transparent',
                  borderBottom: isActive ? '2px solid var(--cyan)' : '2px solid transparent',
                  borderRight: '1px solid rgba(47,99,255,0.1)',
                  cursor: 'pointer', minWidth: 0, flexShrink: 0,
                  color: isActive ? '#a6fcff' : '#4f6888', fontSize: 12, userSelect: 'none'
                }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: tabDot, flexShrink: 0 }} />
                  <span>{tabName}</span>
                  <span onClick={(e) => closeTab(tabId, e)} style={{ marginLeft: 4, color: '#274063', fontSize: 14, lineHeight: 1 }}>×</span>
                </div>);

            })}
          </div>

          {/* Editor + Terminal */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            {/* Code editor — or special full-pane views */}
            <div style={{ flex: 1, overflow: 'auto', padding: activeTab === '__benchmarks' || activeTab === '__memory' ? '0' : '16px 0' }}>
              {activeTab === '__benchmarks' ? <BenchmarkFullView /> :
               activeTab === '__memory'     ? <MemoryFullView />     :
              <div style={{ display: 'flex' }}>
                <div style={{ width: 48, flexShrink: 0, textAlign: 'right', paddingRight: 12, color: '#1a2540', fontSize: 12, lineHeight: '19.2px', userSelect: 'none' }}>
                  {(currentContent.lines || []).map((l) =>
                  <div key={l.n} style={{ height: l.t === 'blank' ? 8 : 19.2 }}>{l.t !== 'blank' ? l.n : ''}</div>
                  )}
                </div>
                <div style={{ flex: 1, paddingRight: 24, fontSize: 13, lineHeight: '19.2px' }}>
                  {(currentContent.lines || []).map((l) =>
                  <div key={l.n} style={{ height: l.t === 'blank' ? 8 : 19.2 }}><CodeLine line={l} /></div>
                  )}
                </div>
              </div>
              }
            </div>

            {/* Terminal */}
            <div style={{
              height: termHeight, overflow: 'hidden',
              transition: 'height 0.22s cubic-bezier(0.4,0,0.2,1)',
              borderTop: terminalOpen ? '1px solid rgba(47,99,255,0.2)' : 'none',
              background: '#020b1e', display: 'flex', flexDirection: 'column', flexShrink: 0, position: 'relative'
            }}>
              {terminalOpen &&
              <>
                  <div style={{ height: 30, display: 'flex', alignItems: 'center', padding: '0 12px', gap: 8, borderBottom: '1px solid rgba(47,99,255,0.1)', background: '#020913', flexShrink: 0 }}>
                    <span style={{ color: '#4f8cfb', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em' }}>Terminal</span>
                    <span style={{ color: '#7efdb9', fontSize: 10 }}>seam</span>
                    <div style={{ flex: 1 }} />
                    <span style={{ color: '#274063', fontSize: 10 }}>type <span style={{ color: '#7fe0ff' }}>/</span> for menu · <span style={{ color: '#f4d676' }}>!</span> for bash · <span style={{ color: '#9b6cff' }}>?</span> for help</span>
                    <button onClick={() => setTerminalOpen(false)} style={{ background: 'none', border: 'none', color: '#274063', cursor: 'pointer', fontSize: 16, lineHeight: 1 }}>×</button>
                  </div>

                  {/* Command menu */}
                  {termMenuOpen &&
                <div style={{
                  position: 'absolute', bottom: 44, left: 12, zIndex: 50,
                  background: '#030d20', border: '1px solid rgba(79,140,251,0.25)',
                  borderRadius: 8, padding: '6px 0', minWidth: 280,
                  boxShadow: '0 8px 32px rgba(0,0,0,0.5)'
                }}>
                      <div style={{ padding: '4px 12px 6px', fontSize: 10, color: '#4f8cfb', textTransform: 'uppercase', letterSpacing: '0.1em', borderBottom: '1px solid rgba(47,99,255,0.1)' }}>
                        SEAM Commands
                      </div>
                      {termMenuCommands.map((c) =>
                  <div key={c.cmd} onClick={() => {setTermInput(c.cmd + ' ');setTermMenuOpen(false);termInputRef.current?.focus();}}
                  style={{ display: 'flex', gap: 10, padding: '5px 12px', cursor: 'pointer', fontSize: 12 }}
                  onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(79,140,251,0.08)'}
                  onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                    
                          <span style={{ color: '#7fe0ff', width: 90, flexShrink: 0 }}>{c.cmd}</span>
                          <span style={{ color: '#5a7a9a' }}>{c.desc}</span>
                        </div>
                  )}
                      <div style={{ padding: '4px 12px 0', borderTop: '1px solid rgba(47,99,255,0.1)', marginTop: 4 }}>
                        <span style={{ fontSize: 10, color: '#274063' }}>press Esc to close</span>
                      </div>
                    </div>
                }

                  <div style={{ flex: 1, overflowY: 'auto', padding: '10px 16px', fontSize: 12 }}>
                    {termLines.map((l) => <TermLine key={l.id} line={l} />)}
                    <div ref={termEnd} />
                  </div>
                  <form onSubmit={handleTermSubmit} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 12px', borderTop: '1px solid rgba(47,99,255,0.1)', flexShrink: 0 }}>
                    <span style={{ color: '#4f8cfb', fontSize: 12 }}>❯</span>
                    <input
                    ref={termInputRef}
                    value={termInput}
                    onChange={(e) => {setTermInput(e.target.value);if (e.target.value === '/') setTermMenuOpen(true);else setTermMenuOpen(false);}}
                    onKeyDown={(e) => {if (e.key === 'Escape') setTermMenuOpen(false);}}
                    placeholder="seam ...  ( / menu  · ! bash  · ? help )"
                    style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: '#a6fcff', fontSize: 12, fontFamily: 'var(--font)', caretColor: '#7efdb9' }} />
                  
                  </form>
                </>
              }
            </div>
          </div>
        </div>

        {/* ── Agent chat panel ──────────────────────────────────────── */}
        <div style={{
          width: agentWidth, flexShrink: 0, overflow: 'hidden',
          transition: 'width 0.22s cubic-bezier(0.4,0,0.2,1)',
          borderLeft: agentOpen ? '1px solid rgba(47,99,255,0.15)' : 'none',
          background: '#030d20', display: 'flex', flexDirection: 'column'
        }}>
          {agentOpen &&
          <>
              {/* Agent header with model switcher */}
              <div style={{ height: 36, display: 'flex', alignItems: 'center', padding: '0 10px', gap: 6, borderBottom: '1px solid rgba(47,99,255,0.12)', background: '#020913', flexShrink: 0, position: 'relative' }}>
                <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#7efdb9', boxShadow: '0 0 6px #7efdb9', flexShrink: 0 }} />
                <span style={{ color: '#7fe0ff', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em' }}>SEAM Agent</span>
                <div style={{ flex: 1 }} />
                {/* Model picker button */}
                <button onClick={() => setModelMenuOpen((v) => !v)} style={{
                display: 'flex', alignItems: 'center', gap: 4, padding: '2px 7px',
                background: 'rgba(79,140,251,0.08)', border: `1px solid ${selectedModel.color}40`,
                borderRadius: 4, cursor: 'pointer', fontSize: 10, fontFamily: 'var(--font)',
                color: selectedModel.color
              }}>
                  <span>{selectedModel.label}</span>
                  <span style={{ opacity: 0.5, fontSize: 8 }}>▾</span>
                </button>
                <button onClick={() => setAgentOpen(false)} style={{ background: 'none', border: 'none', color: '#274063', cursor: 'pointer', fontSize: 16, lineHeight: 1, marginLeft: 2 }}>×</button>

                {/* Model dropdown */}
                {modelMenuOpen &&
              <div style={{
                position: 'absolute', top: 38, right: 30, zIndex: 60,
                background: '#030d20', border: '1px solid rgba(79,140,251,0.25)',
                borderRadius: 8, padding: '6px 0', minWidth: 220,
                boxShadow: '0 8px 32px rgba(0,0,0,0.5)'
              }}>
                    {['Anthropic', 'OpenAI', 'Google', 'Ollama'].map((provider) => {
                  const group = MODEL_OPTIONS.filter((m) => m.provider === provider);
                  return (
                    <div key={provider}>
                          <div style={{ padding: '4px 12px', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#274063' }}>{provider}</div>
                          {group.map((m) =>
                      <div key={m.id} onClick={() => {setSelectedModel(m);setModelMenuOpen(false);}}
                      style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '5px 14px', cursor: 'pointer', fontSize: 12, background: selectedModel.id === m.id ? 'rgba(79,140,251,0.1)' : 'transparent' }}
                      onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(79,140,251,0.07)'}
                      onMouseLeave={(e) => e.currentTarget.style.background = selectedModel.id === m.id ? 'rgba(79,140,251,0.1)' : 'transparent'}>
                        
                              <span style={{ width: 5, height: 5, borderRadius: '50%', background: m.color, flexShrink: 0 }} />
                              <span style={{ color: selectedModel.id === m.id ? '#a6fcff' : '#8090b0' }}>{m.label}</span>
                            </div>
                      )}
                        </div>);

                })}
                  </div>
              }
              </div>

              <div style={{ flex: 1, overflowY: 'auto', padding: '12px 12px 8px' }}>
                {agentMessages.map((m) => <AgentMsg key={m.id} msg={m} />)}
                {agentLoading &&
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: '#4f8cfb', fontSize: 12 }}>
                    <span style={{ animation: 'pulse 1.2s ease-in-out infinite' }}>●</span>
                    <span style={{ color: selectedModel.color, fontSize: 11 }}>{selectedModel.label} thinking...</span>
                  </div>
              }
                <div ref={agentEnd} />
              </div>

              <form onSubmit={handleAgentSubmit} style={{ padding: '10px', borderTop: '1px solid rgba(47,99,255,0.12)', flexShrink: 0 }}>
                <div style={{ display: 'flex', gap: 6, alignItems: 'flex-end', background: 'rgba(8,19,42,0.9)', border: '1px solid rgba(79,140,251,0.25)', borderRadius: 8, padding: '8px 10px' }}>
                  <textarea
                  value={agentInput}
                  onChange={(e) => setAgentInput(e.target.value)}
                  onKeyDown={(e) => {if (e.key === 'Enter' && !e.shiftKey) {e.preventDefault();handleAgentSubmit(e);}}}
                  placeholder="Ask SEAM agent..."
                  rows={2}
                  style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: '#a6fcff', fontSize: 12, fontFamily: 'var(--font)', resize: 'none', lineHeight: 1.5, caretColor: '#7efdb9' }} />
                
                  <button type="submit" disabled={agentLoading || !agentInput.trim()} style={{
                  background: agentInput.trim() ? 'rgba(79,140,251,0.2)' : 'transparent',
                  border: '1px solid rgba(79,140,251,0.3)', borderRadius: 6, padding: '5px 10px',
                  color: agentInput.trim() ? '#7fe0ff' : '#274063',
                  cursor: agentInput.trim() ? 'pointer' : 'default', fontSize: 12, fontFamily: 'var(--font)', transition: 'all 0.15s'
                }}>↑</button>
                </div>
              </form>
            </>
          }
        </div>
      </div>

      {/* ── Bottom toolbar ────────────────────────────────────────────── */}
      <div style={{ height: 30, background: '#020913', borderTop: '1px solid rgba(47,99,255,0.15)', display: 'flex', alignItems: 'center', padding: '0 8px', gap: 2, flexShrink: 0 }}>
        {[
        { label: 'Terminal', active: terminalOpen, toggle: () => setTerminalOpen((v) => !v), color: '#7fe0ff', activeColor: 'rgba(127,224,255,0.08)', activeBorder: 'rgba(127,224,255,0.25)',
          icon: <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="4,6 10,12 4,18" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /><line x1="12" y1="18" x2="20" y2="18" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg> },
        { label: 'Agent', active: agentOpen, toggle: () => setAgentOpen((v) => !v), color: '#9b6cff', activeColor: 'rgba(155,108,255,0.08)', activeBorder: 'rgba(155,108,255,0.3)',
          icon: <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" /></svg> },
        { label: 'Explorer', active: explorerOpen, toggle: () => setExplorerOpen((v) => !v), color: '#4f8cfb', activeColor: 'rgba(79,140,251,0.08)', activeBorder: 'rgba(79,140,251,0.25)',
          icon: <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.7" /><rect x="13" y="3" width="8" height="5" rx="1.5" stroke="currentColor" strokeWidth="1.7" /><rect x="13" y="11" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.7" /></svg> }].
        map((btn) =>
        <button key={btn.label} onClick={btn.toggle} title={`Toggle ${btn.label}`} style={{
          display: 'flex', alignItems: 'center', gap: 5, padding: '0 10px', height: 22,
          background: btn.active ? btn.activeColor : 'transparent',
          border: '1px solid ' + (btn.active ? btn.activeBorder : 'rgba(47,99,255,0.15)'),
          borderRadius: 4, cursor: 'pointer',
          color: btn.active ? btn.color : '#4f6888',
          fontSize: 11, fontFamily: 'var(--font)', transition: 'all 0.15s'
        }}>{btn.icon}{btn.label}</button>
        )}
        <div style={{ flex: 1 }} />
        <StatusBar />
      </div>

      {/* Tweaks panel */}
      <TweaksPanel>
        <window.TweakSection title="Layout">
          <window.TweakToggle label="Show metrics in explorer" tweakKey="showMetrics" />
          <window.TweakSlider label="Explorer width" tweakKey="explorerWidth" min={160} max={360} step={10} />
          <window.TweakSlider label="Agent panel width" tweakKey="agentWidth" min={220} max={480} step={10} />
          <window.TweakSlider label="Terminal height" tweakKey="terminalHeight" min={120} max={400} step={10} />
        </window.TweakSection>
        <window.TweakSection title="Accent">
          <window.TweakColor label="Accent color" tweakKey="accentColor" />
        </window.TweakSection>
      </TweaksPanel>

      <style>{`
        @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #274063; }
        button:focus { outline: none; }
        textarea::placeholder, input::placeholder { color: #274063; }
      `}</style>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
