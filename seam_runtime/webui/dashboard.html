// ── Syntax-colored line renderer ──────────────────────────────────────────
const S = {
  comment: { color: '#5a7a9a', fontStyle: 'italic' },
  kw: { color: '#9b6cff' },
  def: { color: '#9b6cff' },
  defName: { color: '#7fe0ff' },
  rest: { color: '#bfefff' },
  str: { color: '#7efdb9' },
  decorator: { color: '#f4d676' },
  import: { color: '#9b6cff' },
  plain: { color: '#bfefff' },
  blank: { color: 'transparent' },
  'md-h1': { color: '#a6fcff', fontWeight: 600 },
  'md-h2': { color: '#7fe0ff', fontWeight: 600 }
};

function CodeLine({ line }) {
  if (line.t === 'blank') return <div style={{ height: 8 }} />;
  if (line.t === 'def') return (
    <div>
      <span style={S.kw}>{line.v}</span>
      <span style={S.defName}>{line.name}</span>
      <span style={S.rest}>{line.rest}</span>
    </div>);

  if (line.t === 'kw') return (
    <div><span style={S.kw}>{line.v}</span><span style={S.rest}>{line.rest}</span></div>);

  if (line.t === 'import') return (
    <div><span style={S.import}>{line.v}</span><span style={S.rest}>{line.rest}</span></div>);

  return <div style={S[line.t] || S.plain}>{line.v}</div>;
}

// ── FileTree node ─────────────────────────────────────────────────────────
function FileNode({ node, depth, openFile, activeFile, openFolders, toggleFolder }) {
  const isOpen = openFolders.has(node.id);
  const isActive = activeFile === node.id;

  if (node.type === 'folder') {
    return (
      <div>
        <div
          style={{
            display: 'flex', alignItems: 'center', gap: 5,
            padding: '3px 8px 3px ' + (8 + depth * 14) + 'px',
            cursor: 'pointer', color: '#7fe0ff',
            background: isOpen ? 'rgba(79,140,251,0.06)' : 'transparent',
            userSelect: 'none'
          }}
          onClick={() => toggleFolder(node.id)}>

          <span style={{ fontSize: 10, color: '#4f8cfb', width: 10 }}>{isOpen ? '▾' : '▸'}</span>
          <span style={{ fontSize: 11 }}>{node.name}</span>
        </div>
        {isOpen && node.children && node.children.map((child) =>
        <FileNode key={child.id} node={child} depth={depth + 1}
        openFile={openFile} activeFile={activeFile}
        openFolders={openFolders} toggleFolder={toggleFolder} />
        )}
      </div>);

  }

  const extColors = { py: '#9b6cff', svg: '#7fe0ff', html: '#f4d676', md: '#7efdb9', txt: '#bfefff', toml: '#f4d676' };
  const dotColor = extColors[node.lang] || '#bfefff';

  return (
    <div
      style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '3px 8px 3px ' + (20 + depth * 14) + 'px',
        cursor: 'pointer',
        background: isActive ? 'rgba(127,224,255,0.1)' : 'transparent',
        color: isActive ? '#a6fcff' : '#8090b0',
        borderLeft: isActive ? '2px solid #7fe0ff' : '2px solid transparent'
      }}
      onClick={() => openFile(node.id)}>

      <span style={{ width: 6, height: 6, borderRadius: '50%', background: dotColor, flexShrink: 0 }} />
      <span style={{ fontSize: 12 }}>{node.name}</span>
    </div>);

}

// ── Status bar ────────────────────────────────────────────────────────────
function StatusBar() {
  const [time, setTime] = useState(new Date());
  const [apiConnected, setApiConnected] = useState(false);
  const [liveStats, setLiveStats] = useState(null);

  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  // Poll API health + stats every 15s
  useEffect(() => {
    let cancelled = false;
    const poll = async () => {
      try {
        await window.SeamAPI.health();
        if (!cancelled) setApiConnected(true);
        try {
          const stats = await window.SeamAPI.stats();
          if (!cancelled) setLiveStats(stats);
        } catch (_) { /* stats may need auth */ }
      } catch (_) {
        if (!cancelled) setApiConnected(false);
      }
    };
    poll();
    const interval = setInterval(poll, 15000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);

  const fmt = (t) => t.toLocaleTimeString('en-US', { hour12: false });
  const recordCount = liveStats?.total_records;
  const recordLabel = recordCount != null
    ? (recordCount >= 1000000 ? (recordCount / 1000000).toFixed(1) + 'M' : recordCount >= 1000 ? (recordCount / 1000).toFixed(1) + 'K' : String(recordCount))

  return (
    <div style={{

      borderTop: 'none',
      display: 'flex', alignItems: 'center',
      padding: '0 4px 0 8px', gap: 14,

      flexShrink: 0
    }}>
      <span style={{ color: apiConnected ? '#7efdb9' : '#f4d676', display: 'flex', alignItems: 'center', gap: 5 }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: apiConnected ? '#7efdb9' : '#f4d676', display: 'inline-block', boxShadow: `0 0 6px ${apiConnected ? '#7efdb9' : '#f4d676'}` }} />

// ── localStorage persistence helper ──────────────────────────────────────
function usePersisted(storageKey, defaultValue) {
  const [value, setValue] = React.useState(() => {
    try {
      const stored = localStorage.getItem(storageKey);
      if (stored) return JSON.parse(stored);
    } catch (_) { /* ignore parse errors */ }
    return typeof defaultValue === 'function' ? defaultValue() : defaultValue;
  });
  // Auto-save on change
  React.useEffect(() => {
    try {
      localStorage.setItem(storageKey, JSON.stringify(value));
    } catch (_) { /* quota or private mode */ }
  }, [value, storageKey]);
  return [value, setValue];
}

          const isTesting = testing === k.key;
          const result = testResults[k.key];
          return (
            <div key={k.key} style={{
              padding: '10px 12px',
              background: filled ? 'rgba(8,19,42,0.85)' : 'rgba(8,19,42,0.5)',
              border: `1px solid ${filled ? k.color + '30' : 'rgba(47,99,255,0.1)'}`,
              borderLeft: `3px solid ${filled ? k.color : 'rgba(47,99,255,0.2)'}`,
              borderRadius: 5,
              opacity: k.enabled === false ? 0.55 : 1
            }}>
              <div style={{ display: 'flex', alignItems: 'stretch', gap: 8 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 5, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 9, padding: '1px 6px', borderRadius: 3, background: `${k.color}18`, color: k.color, border: `1px solid ${k.color}30`, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{k.provider}</span>
                    <span style={{ fontSize: 11, color: '#bfefff', fontFamily: 'var(--font)' }}>{k.key}</span>
                    <span style={{ fontSize: 9, padding: '1px 5px', borderRadius: 3, background: filled ? 'rgba(126,253,185,0.08)' : 'rgba(39,64,99,0.3)', color: filled ? '#7efdb9' : '#5a7a9a' }}>{filled ? 'set' : 'empty'}</span>
                    {!k.builtin && <span style={{ fontSize: 8, padding: '1px 5px', borderRadius: 3, background: 'rgba(127,224,255,0.08)', color: '#7fe0ff', border: '1px solid rgba(127,224,255,0.2)' }}>custom</span>}
                    {result &&
                    <span style={{ fontSize: 9, padding: '1px 5px', borderRadius: 3, background: result.ok ? 'rgba(126,253,185,0.1)' : 'rgba(255,107,107,0.1)', color: result.ok ? '#7efdb9' : '#ff6b6b', border: `1px solid ${result.ok ? 'rgba(126,253,185,0.25)' : 'rgba(255,107,107,0.25)'}` }}>
                        {result.ok ? `✓ ${result.status} · ${result.latency}ms` : `✗ ${result.status}`}
                      </span>
                    }
                    <div style={{ flex: 1 }} />
                    {/* Enabled toggle */}
                    <div onClick={() => updateField(k.key, 'enabled', k.enabled === false ? true : false)} title={k.enabled === false ? 'Enable' : 'Disable'}
                    style={{ width: 24, height: 13, borderRadius: 7, position: 'relative', flexShrink: 0, background: k.enabled === false ? '#1a2540' : k.color + 'aa', border: `1px solid ${k.enabled === false ? '#274063' : k.color}`, cursor: 'pointer', transition: 'background 0.18s' }}>
                      <div style={{ position: 'absolute', top: 1, left: k.enabled === false ? 1 : 12, width: 9, height: 9, borderRadius: '50%', background: k.enabled === false ? '#5a7a9a' : '#020b1e', transition: 'left 0.18s' }} />
                    </div>
                  </div>

                  {/* Value row */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: isExpanded ? 8 : 0 }}>
                    <input
                      type={secret && !revealed[k.key] ? 'password' : 'text'}
                      value={k.value}
                      onChange={(e) => updateValue(k.key, e.target.value)}
                      placeholder={secret ? '••••••••' : 'enter value...'}
                      style={{ flex: 1, minWidth: 0, background: '#020b1e', border: '1px solid rgba(47,99,255,0.15)', borderRadius: 4, padding: '5px 8px', color: filled ? k.color : '#5a7a9a', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
                    {secret &&
                    <button onClick={() => setRevealed((r) => ({ ...r, [k.key]: !r[k.key] }))} title={revealed[k.key] ? 'Hide' : 'Reveal'}
                    style={{ width: 28, height: 24, background: 'rgba(79,140,251,0.05)', border: '1px solid rgba(47,99,255,0.15)', borderRadius: 3, color: '#7fe0ff', cursor: 'pointer', fontSize: 11, lineHeight: 1, flexShrink: 0 }}>
                        {revealed[k.key] ? '◉' : '○'}
                      </button>
                    }
                    <button onClick={() => testKey(k)} disabled={isTesting || !filled} title="Test connection"
                    style={{ padding: '4px 8px', height: 24, background: isTesting ? 'rgba(127,224,255,0.15)' : filled ? 'rgba(127,224,255,0.06)' : 'transparent', border: `1px solid ${filled ? 'rgba(127,224,255,0.25)' : 'rgba(47,99,255,0.1)'}`, borderRadius: 3, color: filled ? '#7fe0ff' : '#5a7a9a', cursor: filled && !isTesting ? 'pointer' : 'default', fontSize: 10, fontFamily: 'var(--font)', flexShrink: 0, display: 'flex', alignItems: 'center', gap: 4 }}>
                      {isTesting ? <><span style={{ animation: 'pulse 0.8s ease-in-out infinite' }}>●</span> testing</> : <>↗ test</>}
                    </button>
                    <button onClick={() => beginRotate(k)} disabled={!filled} title="Rotate key — replace with new value"
                    style={{ padding: '4px 8px', height: 24, background: filled ? 'rgba(155,108,255,0.06)' : 'transparent', border: `1px solid ${filled ? 'rgba(155,108,255,0.25)' : 'rgba(47,99,255,0.1)'}`, borderRadius: 3, color: filled ? '#9b6cff' : '#5a7a9a', cursor: filled ? 'pointer' : 'default', fontSize: 10, fontFamily: 'var(--font)', flexShrink: 0, display: 'flex', alignItems: 'center', gap: 4 }}>
                      <svg width="9" height="9" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 12a9 9 0 0 1 15-6.7L21 8M3 4v4h4M21 20v-4h-4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
                      rotate
                    </button>
                    <button onClick={() => setExpanded((e) => ({ ...e, [k.key]: !e[k.key] }))} title={isExpanded ? 'Collapse' : 'Configure endpoint, auth, model'}
                    style={{ width: 28, height: 24, background: isExpanded ? 'rgba(127,224,255,0.1)' : 'transparent', border: '1px solid rgba(47,99,255,0.15)', borderRadius: 3, color: '#7fe0ff', cursor: 'pointer', fontSize: 10, lineHeight: 1, flexShrink: 0 }}>
                      {isExpanded ? '▴' : '▾'}
                    </button>
                    <button onClick={() => {
                      if (k.builtin) {
                        if (!window.confirm(`Delete the built-in ${k.key}? You can re-add it from the quick-add chips below.`)) return;
                      }
                      removeKey(k.key);
                    }} title={k.builtin ? 'Delete (built-in)' : 'Remove key'}
                    style={{ width: 24, height: 24, background: 'rgba(255,107,107,0.05)', border: '1px solid rgba(255,107,107,0.2)', borderRadius: 3, color: '#ff6b6b', cursor: 'pointer', fontSize: 13, lineHeight: 1, flexShrink: 0 }}
                    onMouseEnter={(e) => {e.currentTarget.style.background = 'rgba(255,107,107,0.15)';}}
                    onMouseLeave={(e) => {e.currentTarget.style.background = 'rgba(255,107,107,0.05)';}}>×</button>
                  </div>

                  {!isExpanded &&
                  <div style={{ fontSize: 9, color: '#274063', marginTop: 4, display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                      <span>{k.hint}</span>
                      {k.baseUrl && <><span style={{ color: '#1a2540' }}>·</span><span style={{ color: '#5a7a9a' }}>{k.baseUrl}</span></>}
                      {k.model && <><span style={{ color: '#1a2540' }}>·</span><span style={{ color: '#9b6cff' }}>{k.model}</span></>}
                      {k.rotatedAt && <><span style={{ color: '#1a2540' }}>·</span><span style={{ color: '#7efdb9' }}>rotated {k.rotatedAt}</span></>}
                    </div>
                  }

                  {/* Rotate panel */}
                  {rotating === k.key &&
                  <div style={{ marginTop: 8, padding: '10px 12px', background: 'rgba(155,108,255,0.05)', border: '1px solid rgba(155,108,255,0.3)', borderRadius: 5 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 12a9 9 0 0 1 15-6.7L21 8M3 4v4h4M21 20v-4h-4" stroke="#9b6cff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
                        <span style={{ fontSize: 10, color: '#9b6cff', textTransform: 'uppercase', letterSpacing: '0.09em', fontWeight: 600 }}>Rotate {k.key}</span>
                        <div style={{ flex: 1 }} />
                        <span style={{ fontSize: 9, color: '#5a7a9a' }}>previous value will be replaced</span>
                      </div>
                      <div style={{ display: 'flex', gap: 5, marginBottom: 6 }}>
                        <input
                        type="text"
                        value={rotateValue}
                        onChange={(e) => setRotateValue(e.target.value)}
                        placeholder="paste new value or click generate →"
                        autoFocus
                        style={{ flex: 1, background: '#020b1e', border: '1px solid rgba(155,108,255,0.25)', borderRadius: 3, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
                        <button onClick={() => generateRotation(k)} style={{ padding: '4px 10px', background: 'rgba(155,108,255,0.1)', border: '1px solid rgba(155,108,255,0.3)', borderRadius: 3, color: '#9b6cff', fontSize: 10, fontFamily: 'var(--font)', cursor: 'pointer', whiteSpace: 'nowrap' }}>⚡ generate</button>
                      </div>
                      <div style={{ display: 'flex', gap: 5 }}>
                        <button onClick={() => confirmRotate(k)} disabled={!rotateValue.trim()}
                      style={{ padding: '5px 12px', background: rotateValue.trim() ? 'rgba(126,253,185,0.15)' : 'rgba(39,64,99,0.3)', border: `1px solid ${rotateValue.trim() ? 'rgba(126,253,185,0.35)' : 'rgba(47,99,255,0.15)'}`, borderRadius: 3, color: rotateValue.trim() ? '#7efdb9' : '#5a7a9a', fontSize: 10, fontFamily: 'var(--font)', cursor: rotateValue.trim() ? 'pointer' : 'default' }}>
                          ✓ confirm rotation
                        </button>
                        <button onClick={() => {setRotating(null);setRotateValue('');}} style={{ padding: '5px 10px', background: 'transparent', border: '1px solid rgba(47,99,255,0.15)', borderRadius: 3, color: '#5a7a9a', fontSize: 10, fontFamily: 'var(--font)', cursor: 'pointer' }}>cancel</button>
                        {k.rotationHistory && k.rotationHistory.length > 0 &&
                      <span style={{ marginLeft: 'auto', alignSelf: 'center', fontSize: 9, color: '#5a7a9a', fontFamily: 'var(--font)' }}>
                            {k.rotationHistory.length} prior rotation{k.rotationHistory.length === 1 ? '' : 's'}
                          </span>
                      }
                      </div>
                    </div>
                  }

                  {/* Expanded details */}
                  {isExpanded &&
                  <div style={{ padding: '8px 10px', background: '#020b1e', border: '1px solid rgba(47,99,255,0.1)', borderRadius: 4, marginTop: 4 }}>
                      <div style={{ fontSize: 9, color: '#274063', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 8 }}>Endpoint & Auth</div>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                        <div>
                          <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 2 }}>Base URL</div>
                          <input value={k.baseUrl || ''} onChange={(e) => updateField(k.key, 'baseUrl', e.target.value)}
                        placeholder="https://api.example.com/v1"
                        style={{ width: '100%', background: '#030d20', border: '1px solid rgba(47,99,255,0.18)', borderRadius: 3, padding: '4px 7px', color: '#bfefff', fontSize: 10, fontFamily: 'var(--font)', outline: 'none' }} />
                        </div>
                        <div>
                          <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 2 }}>Default model</div>
                          <input value={k.model || ''} onChange={(e) => updateField(k.key, 'model', e.target.value)}
                        placeholder="model-id-default"
                        style={{ width: '100%', background: '#030d20', border: '1px solid rgba(47,99,255,0.18)', borderRadius: 3, padding: '4px 7px', color: '#bfefff', fontSize: 10, fontFamily: 'var(--font)', outline: 'none' }} />
                        </div>
                        <div>
                          <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 2 }}>Auth scheme</div>
                          <select value={k.authType || 'Bearer'} onChange={(e) => updateField(k.key, 'authType', e.target.value)}
                        style={{ width: '100%', background: '#030d20', border: '1px solid rgba(47,99,255,0.18)', borderRadius: 3, padding: '4px 7px', color: '#bfefff', fontSize: 10, fontFamily: 'var(--font)', outline: 'none' }}>
                            {['Bearer', 'API-Key', 'Basic', 'X-API-Key', 'Query param', 'Custom header', 'None'].map((o) => <option key={o} value={o}>{o}</option>)}
                          </select>
                        </div>
                        <div>
                          <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 2 }}>Header name</div>
                          <input value={k.authHeader || ''} onChange={(e) => updateField(k.key, 'authHeader', e.target.value)}
                        placeholder="Authorization"
                        style={{ width: '100%', background: '#030d20', border: '1px solid rgba(47,99,255,0.18)', borderRadius: 3, padding: '4px 7px', color: '#bfefff', fontSize: 10, fontFamily: 'var(--font)', outline: 'none' }} />
                        </div>
                        <div>
                          <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 2 }}>Rate limit</div>
                          <input value={k.rateLimit || ''} onChange={(e) => updateField(k.key, 'rateLimit', e.target.value)}
                        placeholder="60 req/min · 1M tokens/day"
                        style={{ width: '100%', background: '#030d20', border: '1px solid rgba(47,99,255,0.18)', borderRadius: 3, padding: '4px 7px', color: '#bfefff', fontSize: 10, fontFamily: 'var(--font)', outline: 'none' }} />
                        </div>
                        <div>
                          <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 2 }}>Description</div>
                          <input value={k.hint || ''} onChange={(e) => updateField(k.key, 'hint', e.target.value)}
                        placeholder="What this credential unlocks"
                        style={{ width: '100%', background: '#030d20', border: '1px solid rgba(47,99,255,0.18)', borderRadius: 3, padding: '4px 7px', color: '#bfefff', fontSize: 10, fontFamily: 'var(--font)', outline: 'none' }} />
                        </div>
                      </div>

                      {/* Live preview of the auth header SEAM will send */}
                      <div style={{ marginTop: 10, paddingTop: 8, borderTop: '1px dashed rgba(47,99,255,0.12)' }}>
                        <div style={{ fontSize: 9, color: '#274063', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 5 }}>Request preview</div>
                        <div style={{ background: '#000', border: '1px solid rgba(47,99,255,0.1)', borderRadius: 3, padding: '6px 8px', fontSize: 10, fontFamily: 'var(--font)', color: '#7efdb9', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          <span style={{ color: '#4f8cfb' }}>POST</span> <span style={{ color: '#bfefff' }}>{k.baseUrl || '<base-url>'}</span>
                          <br />
                          <span style={{ color: '#9b6cff' }}>{k.authHeader || 'Authorization'}</span>
                          <span style={{ color: '#5a7a9a' }}>: </span>
                          <span style={{ color: '#f4d676' }}>{k.authType === 'Bearer' ? 'Bearer ' : k.authType === 'Basic' ? 'Basic ' : ''}</span>
                          <span style={{ color: filled ? k.color : '#5a7a9a' }}>{filled ? revealed[k.key] ? k.value : '••••••••' : '<value>'}</span>
                        </div>
                      </div>
                    </div>
                  }
                </div>
              </div>
            </div>);

        })}
      </div>

      {/* Add custom key */}
      {!adding ?
      <button onClick={() => setAdding(true)} style={{ padding: '7px 14px', background: 'rgba(127,224,255,0.06)', border: '1px solid rgba(127,224,255,0.25)', borderRadius: 5, color: '#7fe0ff', fontSize: 11, fontFamily: 'var(--font)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontSize: 14, lineHeight: 1 }}>+</span>
          add custom API key
        </button> :

      <div style={{ padding: '14px 16px', background: 'rgba(127,224,255,0.04)', border: '1px solid rgba(127,224,255,0.25)', borderRadius: 6 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <span style={{ fontSize: 11, color: '#7fe0ff', textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600 }}>New API key</span>
            <span style={{ fontSize: 9, color: '#5a7a9a' }}>configure a credential the SEAM runtime can call out with</span>
          </div>

          {/* Identity */}
          <div style={{ fontSize: 9, color: '#4f8cfb', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 6 }}>Identity</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Provider name *</div>
              <input value={draft.provider} onChange={(e) => setDraft((d) => ({ ...d, provider: e.target.value }))}
            placeholder="OpenAI, HuggingFace, etc." autoFocus
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Env var name *</div>
              <input value={draft.key} onChange={(e) => setDraft((d) => ({ ...d, key: e.target.value.toUpperCase().replace(/[^A-Z0-9_]/g, '_') }))}
            placeholder="MY_API_KEY"
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#7fe0ff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
          </div>

          {/* Credential */}
          <div style={{ fontSize: 9, color: '#4f8cfb', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 6 }}>Credential</div>
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Secret value *</div>
            <input type="password" value={draft.value} onChange={(e) => setDraft((d) => ({ ...d, value: e.target.value }))}
          placeholder="paste your API key/token"
          style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
          </div>

          {/* Endpoint */}
          <div style={{ fontSize: 9, color: '#4f8cfb', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 6, marginTop: 4 }}>Endpoint & auth</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 8 }}>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Base URL *</div>
              <input value={draft.baseUrl} onChange={(e) => setDraft((d) => ({ ...d, baseUrl: e.target.value }))}
            placeholder="https://api.example.com/v1"
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Default model</div>
              <input value={draft.model} onChange={(e) => setDraft((d) => ({ ...d, model: e.target.value }))}
            placeholder="model-id (optional)"
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Auth scheme</div>
              <select value={draft.authType} onChange={(e) => setDraft((d) => ({ ...d, authType: e.target.value }))}
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }}>
                {['Bearer', 'API-Key', 'Basic', 'X-API-Key', 'Query param', 'Custom header', 'None'].map((o) => <option key={o} value={o}>{o}</option>)}
              </select>
            </div>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Header name</div>
              <input value={draft.authHeader} onChange={(e) => setDraft((d) => ({ ...d, authHeader: e.target.value }))}
            placeholder="Authorization"
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
          </div>

          {/* Metadata */}
          <div style={{ fontSize: 9, color: '#4f8cfb', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 6 }}>Metadata</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Rate limit</div>
              <input value={draft.rateLimit} onChange={(e) => setDraft((d) => ({ ...d, rateLimit: e.target.value }))}
            placeholder="60 req/min · 1M tokens/day"
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Description</div>
              <input value={draft.hint} onChange={(e) => setDraft((d) => ({ ...d, hint: e.target.value }))}
            placeholder="What this key unlocks"
            onKeyDown={(e) => {if (e.key === 'Enter') addKey();}}
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
          </div>

          {/* Request preview */}
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 9, color: '#274063', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 5 }}>Request preview</div>
            <div style={{ background: '#000', border: '1px solid rgba(47,99,255,0.1)', borderRadius: 3, padding: '6px 8px', fontSize: 10, fontFamily: 'var(--font)', lineHeight: 1.5 }}>
              <span style={{ color: '#4f8cfb' }}>POST</span> <span style={{ color: '#bfefff' }}>{draft.baseUrl || '<base-url>'}</span>
              <br />
              <span style={{ color: '#9b6cff' }}>{draft.authHeader || 'Authorization'}</span>
              <span style={{ color: '#5a7a9a' }}>: </span>
              <span style={{ color: '#f4d676' }}>{draft.authType === 'Bearer' ? 'Bearer ' : draft.authType === 'Basic' ? 'Basic ' : ''}</span>
              <span style={{ color: draft.value ? '#7efdb9' : '#5a7a9a' }}>{draft.value ? '••••••••' : '<secret>'}</span>
            </div>
          </div>

          <div style={{ display: 'flex', gap: 6 }}>

}

                width: 10, height: 10, borderRadius: '50%',
                background: s.enabled ? '#fff' : '#5a7a9a',
                transition: 'left 0.18s'
              }} />
              </div>
              <button onClick={() => removeSkill(s.name)} title="Remove skill" style={{ background: 'none', border: 'none', color: '#274063', cursor: 'pointer', fontSize: 12, lineHeight: 1, padding: 0, flexShrink: 0 }}
            onMouseEnter={(e) => e.currentTarget.style.color = '#ff6b6b'}
            onMouseLeave={(e) => e.currentTarget.style.color = '#274063'}>×</button>
            </div>
            <div style={{ fontSize: 10, color: '#7fe0ff', marginBottom: 3, fontFamily: 'var(--font)' }}>{s.trigger}</div>
            <div style={{ fontSize: 10, color: '#5a7a9a', marginBottom: 8, lineHeight: 1.4 }}>{s.desc}</div>
            <PathLink path={s.path} tabId={s.tabId} />
          </div>
        )}
      </div>

      {/* ─── Docs ─── */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, marginTop: 18, paddingBottom: 6, borderBottom: '1px solid rgba(47,99,255,0.12)' }}>
        <span style={{ fontSize: 13, color: '#7fe0ff' }}>¶</span>
        <span style={{ fontSize: 11, color: '#a6fcff', textTransform: 'uppercase', letterSpacing: '0.11em', fontWeight: 600 }}>Documentation</span>
        <span style={{ fontSize: 9, padding: '1px 6px', borderRadius: 3, background: 'rgba(79,140,251,0.1)', color: '#4f8cfb' }}>{docs.length}</span>
        <div style={{ flex: 1 }} />
        <button onClick={() => setAddingDoc((v) => !v)} title="Add a markdown file or location"
        style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '2px 8px', background: addingDoc ? 'rgba(126,253,185,0.12)' : 'rgba(126,253,185,0.06)', border: '1px solid rgba(126,253,185,0.25)', borderRadius: 4, color: '#7efdb9', cursor: 'pointer', fontSize: 9, fontFamily: 'var(--font)' }}>
          <span style={{ fontSize: 12, lineHeight: 1 }}>{addingDoc ? '×' : '+'}</span>
          {addingDoc ? 'cancel' : 'add doc'}
        </button>
      </div>

      {addingDoc &&
      <div style={{ marginBottom: 8, padding: '10px 12px', background: 'rgba(126,253,185,0.04)', border: '1px solid rgba(126,253,185,0.2)', borderRadius: 6, display: 'flex', flexDirection: 'column', gap: 6 }}>
          <div style={{ fontSize: 9, color: '#7efdb9', textTransform: 'uppercase', letterSpacing: '0.09em', marginBottom: 2 }}>New markdown doc</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>File name</div>
              <input value={newDoc.name} onChange={(e) => setNewDoc((d) => ({ ...d, name: e.target.value }))}
            placeholder="ARCHITECTURE.md" autoFocus
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
            <div>
              <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Path</div>
              <input value={newDoc.path} onChange={(e) => setNewDoc((d) => ({ ...d, path: e.target.value }))}
            placeholder="./docs/"
            style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
            </div>
          </div>
          <div>
            <div style={{ fontSize: 9, color: '#4f6888', marginBottom: 3 }}>Description</div>
            <input value={newDoc.desc} onChange={(e) => setNewDoc((d) => ({ ...d, desc: e.target.value }))}
          placeholder="What this doc covers..."
          onKeyDown={(e) => {if (e.key === 'Enter') submitNewDoc();}}
          style={{ width: '100%', background: '#020b1e', border: '1px solid rgba(47,99,255,0.2)', borderRadius: 4, padding: '5px 8px', color: '#bfefff', fontSize: 11, fontFamily: 'var(--font)', outline: 'none' }} />
          </div>
          <div style={{ display: 'flex', gap: 6, marginTop: 4 }}>
            <button onClick={submitNewDoc} disabled={!newDoc.name.trim()} style={{
            padding: '4px 12px', background: newDoc.name.trim() ? 'rgba(126,253,185,0.15)' : 'rgba(39,64,99,0.3)',
            border: `1px solid ${newDoc.name.trim() ? 'rgba(126,253,185,0.35)' : 'rgba(47,99,255,0.15)'}`,
            borderRadius: 4, color: newDoc.name.trim() ? '#7efdb9' : '#5a7a9a',
            fontSize: 10, fontFamily: 'var(--font)', cursor: newDoc.name.trim() ? 'pointer' : 'default'
          }}>+ create</button>
            <button onClick={() => {setAddingDoc(false);setNewDoc({ name: '', path: '', desc: '' });}} style={{
            padding: '4px 10px', background: 'transparent', border: '1px solid rgba(47,99,255,0.15)', borderRadius: 4,
            color: '#5a7a9a', fontSize: 10, fontFamily: 'var(--font)', cursor: 'pointer'
          }}>cancel</button>
            <div style={{ flex: 1 }} />
            <span style={{ fontSize: 9, color: '#274063', alignSelf: 'center' }}>tap ↵ in description to create</span>
          </div>
        </div>
      }

      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {docs.map((d) =>
        <div key={d.path} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 10px', background: 'rgba(8,19,42,0.6)', border: '1px solid rgba(47,99,255,0.1)', borderRadius: 6 }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#7efdb9', flexShrink: 0 }} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 12, color: '#bfefff' }}>{d.name}</div>
              <div style={{ fontSize: 9, color: '#274063', marginTop: 1 }}>{d.desc}</div>
            </div>
            <PathLink path={d.path} tabId={d.tabId} />
            {!initialDocs.find((x) => x.path === d.path) &&
          <button onClick={() => removeDoc(d.path)} title="Remove doc"
          style={{ background: 'none', border: 'none', color: '#274063', cursor: 'pointer', fontSize: 13, lineHeight: 1, padding: 0, flexShrink: 0 }}
          onMouseEnter={(e) => e.currentTarget.style.color = '#ff6b6b'}
          onMouseLeave={(e) => e.currentTarget.style.color = '#274063'}>×</button>
          }
          </div>
        )}
      </div>

      <div style={{ marginTop: 20, padding: '10px 12px', background: 'rgba(8,19,42,0.4)', border: '1px dashed rgba(47,99,255,0.15)', borderRadius: 6, fontSize: 10, color: '#5a7a9a', lineHeight: 1.6 }}>
        <span style={{ color: '#7fe0ff' }}>ⓘ sym-linked behavior:</span> these paths point to real files on disk. Clicking <span style={{ color: '#7fe0ff' }}>open ↗</span> mounts the file in the editor — saves (Ctrl+S) write to the canonical location, and the runtime hot-reloads variables on the next request.
      </div>
    </div>);

}

// ── Settings panel ────────────────────────────────────────────────────────
function SettingsPanel({ onClose, onOpenFile }) {
  const [activeSection, setActiveSection] = usePersisted('seam-dash-settings-section', 'api');
  const sections = [
  { id: 'api', label: 'API Keys' },
  { id: 'env', label: 'Environment' },
  { id: 'db', label: 'Database' },
  { id: 'docker', label: 'Docker' },
  { id: 'seam', label: 'seam config' }];

  // Persisted config row overrides — merges user edits on top of defaults
  const defaultConfigs = {
    api: { type: 'api-keys' },

    env: { type: 'env-hub' },

    db: [
    { key: 'SEAM_DB_PATH', value: '~/.local/share/seam/state/seam.db', hint: 'Path to the SQLite canonical store' },
    { key: 'SEAM_DB_WAL_MODE', value: 'enabled', hint: 'Write-Ahead Logging — enables concurrent reads', type: 'select', options: ['enabled', 'disabled'] },
    { key: 'SEAM_DB_CACHE_KB', value: '65536', hint: 'SQLite page cache size in KB (64MB default)' },
    { key: 'SEAM_DB_TIMEOUT', value: '30', hint: 'Connection timeout in seconds' },
    { key: 'SEAM_DB_BACKUP_PATH', value: '~/.local/share/seam/backups/', hint: 'Rolling backup directory' },
    { key: 'SEAM_DB_BACKUP_KEEP', value: '7', hint: 'Number of daily backups to retain' },
    { key: 'SEAM_DB_VACUUM_SCHED', value: 'nightly', hint: 'Vacuum schedule', type: 'select', options: ['nightly', 'weekly', 'manual', 'disabled'] },
    { key: 'PGVECTOR_URL', value: '', hint: 'PostgreSQL connection string (pgvector acceleration layer)' }],

    docker: [
    { key: 'SEAM_IMAGE', value: 'ghcr.io/blackhatshiftey/seam:latest', hint: 'Container image tag' },
    { key: 'SEAM_CONTAINER_NAME', value: 'seam-runtime', hint: 'docker-compose service name' },
    { key: 'DB_VOLUME', value: './data/seam:/root/.local/share/seam', hint: 'Persistent volume mount for SQLite' },
    { key: 'PORT_BINDING', value: '8765:8765', hint: 'REST API host:container port mapping' },
    { key: 'RESTART_POLICY', value: 'unless-stopped', hint: 'Container restart behavior', type: 'select', options: ['unless-stopped', 'always', 'on-failure', 'no'] },
    { key: 'SEAM_DOCKER_ENV', value: 'production', hint: 'Runtime environment profile', type: 'select', options: ['production', 'development', 'test'] },
    { key: 'COMPOSE_FILE', value: './docker-compose.yaml', hint: 'Path to compose file' }],

    seam: [
    { key: 'retrieval_default_mode', value: 'mix', hint: 'Default retrieval strategy', type: 'select', options: ['mix', 'vector', 'graph', 'hybrid', 'lexical'] },
    { key: 'retrieval_default_budget', value: '8', hint: 'Default token budget for context packs' },
    { key: 'benchmark_holdout_gate', value: 'strict', hint: 'Gate mode for benchmark claims', type: 'select', options: ['strict', 'relaxed', 'off'] },
    { key: 'ingest_chunk_size', value: '512', hint: 'Token chunk size for ingestion' },
    { key: 'pack_max_tokens', value: '4096', hint: 'Max tokens per context pack' },
    { key: 'sbert_device', value: 'cpu', hint: 'Device for local embeddings', type: 'select', options: ['cpu', 'cuda', 'mps'] }]

  };
  const [configOverrides, setConfigOverrides] = usePersisted('seam-dash-config-overrides', {});

  // Merge overrides onto defaults
  const configs = React.useMemo(() => {
    const merged = { ...defaultConfigs };
    ['db', 'docker', 'seam'].forEach((section) => {
      if (Array.isArray(merged[section])) {
        merged[section] = merged[section].map((row) => ({
          ...row,
          value: configOverrides[section + ':' + row.key] ?? row.value
        }));
      }
    });
    return merged;
  }, [configOverrides]);

  const sectionConfig = configs[activeSection];
  const isEnvHub = sectionConfig && !Array.isArray(sectionConfig) && sectionConfig.type === 'env-hub';
  const isApiKeys = sectionConfig && !Array.isArray(sectionConfig) && sectionConfig.type === 'api-keys';
  const rows = Array.isArray(sectionConfig) ? sectionConfig : [];
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      background: 'rgba(2,9,19,0.92)', backdropFilter: 'blur(4px)',
      display: 'flex', flexDirection: 'column'
    }}>
      {/* Header */}
      <div style={{
        height: 40, background: '#020913', borderBottom: '1px solid rgba(47,99,255,0.2)',
        display: 'flex', alignItems: 'center', padding: '0 16px', gap: 10, flexShrink: 0
      }}>
        <span style={{ color: '#4f8cfb', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.12em' }}>Settings</span>
        <div style={{ flex: 1 }} />
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#5a7a9a', cursor: 'pointer', fontSize: 18 }}>×</button>
      </div>
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* Sidebar */}
        <div style={{ width: 160, background: '#020b1e', borderRight: '1px solid rgba(47,99,255,0.12)', flexShrink: 0, paddingTop: 8 }}>
          {sections.map((s) =>
          <div key={s.id} onClick={() => setActiveSection(s.id)} style={{
            padding: '7px 16px', fontSize: 12, cursor: 'pointer',
            color: activeSection === s.id ? '#7fe0ff' : '#5a7a9a',
            background: activeSection === s.id ? 'rgba(127,224,255,0.07)' : 'transparent',
            borderLeft: activeSection === s.id ? '2px solid #7fe0ff' : '2px solid transparent'
          }}>{s.label}</div>
          )}
        </div>
        {/* Content */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px' }}>
          <div style={{ fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#4f8cfb', marginBottom: 14 }}>
            {sections.find((s) => s.id === activeSection)?.label}
          </div>
          {isEnvHub &&
          <EnvHub onOpenFile={onOpenFile} onClose={onClose} />
          }
          {isApiKeys && <ApiKeysHub />}
          {!isEnvHub && !isApiKeys && rows.map((row) =>
          <div key={row.key} style={{ marginBottom: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                <span style={{ color: '#7fe0ff', fontSize: 11 }}>{row.key}</span>
                <span style={{ color: '#274063', fontSize: 10, fontStyle: 'italic' }}>{row.hint}</span>
              </div>

              {row.type === 'multiselect' ?
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {row.options.map((opt) => {
                const [selected, setSelected] = React.useState(row.value.includes(opt.id));
                return (
                  <div key={opt.id} style={{
                    display: 'flex', alignItems: 'center', gap: 10,
                    padding: '7px 10px', borderRadius: 6,
                    background: selected ? 'rgba(127,224,255,0.07)' : 'rgba(8,19,42,0.6)',
                    border: `1px solid ${selected ? 'rgba(127,224,255,0.25)' : 'rgba(47,99,255,0.15)'}`,
                    cursor: opt.locked ? 'default' : 'pointer',
                    transition: 'all 0.15s'
                  }} onClick={() => !opt.locked && setSelected((v) => !v)}>
                        <div style={{
                      width: 28, height: 15, borderRadius: 8, flexShrink: 0, position: 'relative',
                      background: selected ? '#7fe0ff' : '#1a2540',
                      border: `1px solid ${selected ? '#7fe0ff' : '#274063'}`,
                      transition: 'background 0.2s',
                      opacity: opt.locked ? 0.5 : 1
                    }}>
                          <div style={{
                        position: 'absolute', top: 1, left: selected ? 13 : 1,
                        width: 11, height: 11, borderRadius: '50%',
                        background: selected ? '#020b1e' : '#274063',
                        transition: 'left 0.2s'
                      }} />
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                            <span style={{ fontSize: 12, color: selected ? '#a6fcff' : '#5a7a9a', fontWeight: selected ? 500 : 400 }}>{opt.label}</span>
                            {opt.locked && <span style={{ fontSize: 8, padding: '1px 5px', borderRadius: 3, background: 'rgba(127,224,255,0.08)', color: '#4f8cfb', border: '1px solid rgba(79,140,251,0.2)' }}>canonical · always on</span>}
                            {!opt.locked && selected && <span style={{ fontSize: 8, padding: '1px 5px', borderRadius: 3, background: 'rgba(126,253,185,0.08)', color: '#7efdb9', border: '1px solid rgba(126,253,185,0.2)' }}>acceleration layer</span>}
                          </div>
                          <div style={{ fontSize: 10, color: '#274063', marginTop: 1 }}>{opt.desc}</div>
                        </div>
                      </div>);

              })}
                  <div style={{ fontSize: 9, color: '#274063', fontStyle: 'italic', paddingLeft: 2 }}>
                    SQLite is always the source of truth. Chroma and pgvector are optional rebuild-able acceleration layers.
                  </div>
                </div> :
            row.type === 'select' ?
            <select value={row.value} onChange={(e) => setConfigOverrides((prev) => ({ ...prev, [activeSection + ':' + row.key]: e.target.value }))} style={{
              width: '100%', background: '#030d20',
              border: '1px solid rgba(47,99,255,0.2)', borderRadius: 5,
              padding: '6px 10px', color: '#a6fcff',
              fontSize: 12, fontFamily: 'var(--font)', outline: 'none',
              cursor: 'pointer', appearance: 'none',
              backgroundImage: `url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%234f8cfb' strokeWidth='1.5' strokeLinecap='round'/%3E%3C/svg%3E")`,
              backgroundRepeat: 'no-repeat', backgroundPosition: 'right 10px center',
              paddingRight: 28
            }}>
                  {row.options.map((opt) =>
              <option key={opt} value={opt} style={{ background: '#030d20', color: '#a6fcff' }}>{opt}</option>
              )}
                </select> :

            <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                  <input
                key={activeSection + ':' + row.key}
                defaultValue={row.value}
                onBlur={(e) => { if (e.target.value !== row.value) setConfigOverrides((prev) => ({ ...prev, [activeSection + ':' + row.key]: e.target.value })); }}
                type={row.key.toLowerCase().includes('key') || row.key.toLowerCase().includes('token') ? 'password' : 'text'}
                style={{
                  flex: 1, background: '#030d20',
                  border: '1px solid rgba(47,99,255,0.2)', borderRadius: 5,
                  padding: '6px 10px', color: '#bfefff',
                  fontSize: 12, fontFamily: 'var(--font)', outline: 'none'
                }} />
                  {(String(row.value).endsWith('.yaml') || String(row.value).endsWith('.toml') || String(row.value).endsWith('.env') || String(row.value).endsWith('.db')) &&
              <button
                onClick={() => {
                  const fileMap = {
                    'docker-compose.yaml': 'docker-compose',
                    'config.toml': 'config-toml',
                    '.env': 'dot-env'
                  };
                  const fname = String(row.value).split('/').pop();
                  const tabId = fileMap[fname];
                  if (tabId && onOpenFile) {onOpenFile(tabId);onClose();}
                }}
                title="Open in editor"
                style={{
                  flexShrink: 0, padding: '5px 8px', borderRadius: 5,
                  background: 'rgba(79,140,251,0.1)', border: '1px solid rgba(79,140,251,0.25)',
                  color: '#4f8cfb', cursor: 'pointer', fontSize: 10, fontFamily: 'var(--font)',
                  display: 'flex', alignItems: 'center', gap: 4
                }}>
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                        <path d="M18 2l4 4-9 9H9v-4l9-9z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                      edit
                    </button>
              }
                </div>
            }
            </div>
          )}
          {!isEnvHub && !isApiKeys && <button style={{
            marginTop: 8, padding: '7px 18px',
            background: 'rgba(79,140,251,0.15)', border: '1px solid rgba(79,140,251,0.3)',
            borderRadius: 5, color: '#7fe0ff', fontSize: 12, fontFamily: 'var(--font)',
            cursor: 'pointer'
          }}>Save changes</button>}
        </div>
      </div>
    </div>);

}

function FsNode({ node, depth, openFolders, toggleFolder, onOpenFile }) {
  const isOpen = openFolders.has(node.id);
  if (node.type === 'folder') {
    return (
      <div>
        <div onClick={() => toggleFolder(node.id)} style={{
          display: 'flex', alignItems: 'center', gap: 5,
          padding: `3px 8px 3px ${8 + depth * 14}px`,
          cursor: 'pointer', color: '#7fe0ff', userSelect: 'none',
          background: isOpen ? 'rgba(79,140,251,0.05)' : 'transparent'
        }}>
          <span style={{ fontSize: 10, color: '#4f8cfb', width: 10 }}>{isOpen ? '▾' : '▸'}</span>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" stroke="#4f8cfb" strokeWidth="1.5" />
          </svg>
          <span style={{ fontSize: 11 }}>{node.name}</span>
        </div>
        {isOpen && node.children && node.children.map((c) =>
        <FsNode key={c.id} node={c} depth={depth + 1} openFolders={openFolders} toggleFolder={toggleFolder} onOpenFile={onOpenFile} />
        )}
      </div>);

  }
  const isDb = node.type === 'dbfile';
  return (
    <div onClick={() => onOpenFile && onOpenFile(node)}
    style={{
      display: 'flex', alignItems: 'center', gap: 6,
      padding: `3px 8px 3px ${20 + depth * 14}px`,
      color: isDb ? '#f4d676' : '#8090b0', fontSize: 12,
      cursor: onOpenFile ? 'pointer' : 'default'
    }}
    onMouseEnter={(e) => {if (onOpenFile) e.currentTarget.style.background = 'rgba(79,140,251,0.06)';}}
    onMouseLeave={(e) => {e.currentTarget.style.background = 'transparent';}}>
      {isDb ?
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="6" rx="8" ry="3" stroke="#f4d676" strokeWidth="1.5" /><path d="M4 6v6c0 1.657 3.582 3 8 3s8-1.343 8-3V6" stroke="#f4d676" strokeWidth="1.5" /><path d="M4 12v6c0 1.657 3.582 3 8 3s8-1.343 8-3v-6" stroke="#f4d676" strokeWidth="1.5" /></svg> :
      <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#274063', flexShrink: 0, display: 'inline-block' }} />
      }
      <span>{node.name}</span>
      {node.size && <span style={{ marginLeft: 'auto', color: '#274063', fontSize: 10 }}>{node.size}</span>}
    </div>);

}

// ── Ingest Panel ─────────────────────────────────────────────────────────
/* DEMO NOTE: Files added without drag-and-drop (e.g. via addDemoFile button
     or empty drops) are simulated — they lack a _file reference and use
     a setInterval-driven pipeline that fakes stage progress.  Only files
     added via real drag-and-drop or the file-picker (<input type=file>)
     carry a _file reference and call the real SEAM REST API via
     ingestFileViaAPI() → SeamAPI.compile(). */
const ingestStages = ['Select files', 'Parse & chunk', 'Compile MIRL', 'Embed vectors', 'Persist to DB'];

function IngestPanel({ width, onOpenSettings }) {
  // Persisted file list — starts empty, populated by user drops/picks
  const [files, setFiles] = usePersisted('seam-dash-ingest-files', []);
  const [dragOver, setDragOver] = useState(false);
  const [batchMode, setBatchMode] = useState('persist');
  const [autoMode, setAutoMode] = useState(false);
  const [autoLog, setAutoLog] = useState([]);

  // Persisted sync ledger — fingerprint of every file that's been ingested so we never re-ingest
  // Stored as array in localStorage, converted to Set for runtime use
  const [ledgerArr, setLedgerArr] = usePersisted('seam-dash-ingest-ledger', []);
  const syncLedger = React.useMemo(() => new Set(ledgerArr), [ledgerArr]);
  const setSyncLedger = (updater) => {
    if (typeof updater === 'function') {
      setLedgerArr((prev) => [...updater(new Set(prev))]);
    } else {
      setLedgerArr([...updater]);
    }
  };
  const [skippedCount, setSkippedCount] = useState(0);
  const fingerprint = (f) => `${f.name}|${f.size}`;

  // Dedupe helper — splits incoming files into fresh vs already-ingested
  const dedupe = (incoming) => {
    const fresh = [];
    let dupes = 0;
    const ledger = syncLedger;
    const seenInBatch = new Set();
    for (const f of incoming) {
      const fp = fingerprint(f);
      if (ledger.has(fp) || seenInBatch.has(fp)) {dupes++;continue;}
      seenInBatch.add(fp);
      fresh.push(f);
    }
    if (dupes > 0) setSkippedCount((s) => s + dupes);
    return { fresh, dupes };
  };

  const resetSync = () => {
    setSyncLedger(new Set());
    setSkippedCount(0);
  };
  const [watchPath, setWatchPath] = useState('~/projects/seam-watch/');
  const autoRef = useRef(null);
  const watchPickerRef = useRef(null);
  const filePickerRef = useRef(null);

  const handleWatchPick = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    // Derive top-level directory name from webkitRelativePath
    const first = files[0];
    const rel = first.webkitRelativePath || first.name;
    const dir = rel.split('/')[0];
    setWatchPath('~/' + dir + '/');
    const incoming = files.slice(0, 20).map((f, i) => ({
      id: 'pick-' + Date.now() + '-' + i,
      name: f.webkitRelativePath || f.name,
      size: (f.size / 1024).toFixed(1) + ' KB',
      status: 'queued', stage: 0, records: 0
    }));
    const { fresh } = dedupe(incoming);
    setFiles((prev) => [...prev, ...fresh]);
    e.target.value = '';
  };

  const handleFilePick = (e) => {
    const pickedFiles = Array.from(e.target.files || []);
    if (!pickedFiles.length) return;
    const incoming = pickedFiles.map((f, i) => ({
      id: 'file-' + Date.now() + '-' + i,
      name: f.name,
      size: (f.size / 1024).toFixed(1) + ' KB',
      status: 'queued', stage: 0, records: 0,
      _file: f  // Keep reference for real API ingest
    }));
    const { fresh } = dedupe(incoming);
    setFiles((prev) => [...prev, ...fresh]);
    e.target.value = '';
  };

  // ── Real API ingest — reads file content and calls SeamAPI.compile ──
  const ingestFileViaAPI = async (fileEntry) => {
    if (!fileEntry._file) return null;
    try {
      const text = await fileEntry._file.text();
      const result = await window.SeamAPI.compile(text, true, 'webui://' + fileEntry.name);
      return { records: (result.records || []).length, ok: true };
    } catch (err) {
      return { records: 0, ok: false, error: err.message };
    }
  };

  // Auto-ingest loop
  useEffect(() => {
    if (!autoMode) {
      if (autoRef.current) clearInterval(autoRef.current);
      return;
    }
    setAutoLog((prev) => [...prev, { t: new Date().toLocaleTimeString('en-US', { hour12: false }), msg: `Auto-ingest active — watching ${watchPath}`, kind: 'info' }]);
    autoRef.current = setInterval(() => {
      // Simulate agent finding and auto-ingesting data
      const actions = [
      'Agent retrieved 3 new MIRL records from context — auto-persisting',
      'New file detected: agent_output.json — queuing for ingest',
      'Vector index sync triggered — 12 new embeddings',
      'Memory consolidation: 4 duplicate records merged',
      'Auto-ingest: clm:51–clm:56 persisted to SQLite'];

      const msg = actions[Math.floor(Math.random() * actions.length)];
      setAutoLog((prev) => [...prev.slice(-19), { t: new Date().toLocaleTimeString('en-US', { hour12: false }), msg, kind: 'ok' }]);
      // Occasionally mark a queued file as running then done
      setFiles((prev) => {
        const queued = prev.find((f) => f.status === 'queued');
        if (queued) return prev.map((f) => f.id === queued.id ? { ...f, status: 'running', stage: 1 } : f);
        const running = prev.find((f) => f.status === 'running');
        if (running) return prev.map((f) => f.id === running.id ? { ...f, status: 'done', stage: 5, records: Math.floor(Math.random() * 20) + 5 } : f);
        return prev;
      });
    }, 2200);
    return () => clearInterval(autoRef.current);
  }, [autoMode]);

  // Retro cyberpunk Apple palette — amber CRT glow for done, phosphor for active
  const statusColor = { done: '#ffb347', running: '#7fe0ff', queued: '#274063', error: '#ff6b6b', preview: '#d391ff' };
  const statusLabel = { done: '✓ ingested', running: 'ingesting', queued: 'queued', error: 'error', preview: 'preview (dry-run)' };

  const addDemoFile = () => {
    const names = ['agent_memory.py', 'benchmarks.py', 'storage.py', 'mirl.py', 'cli.py', 'runtime.py'];
    const name = names[Math.floor(Math.random() * names.length)];
    setFiles((prev) => [...prev, { id: 'f' + Date.now(), name, size: (Math.random() * 60 + 2).toFixed(1) + ' KB', status: 'queued', stage: 0, records: 0 }]);
  };

  const removeFile = (id) => setFiles((prev) => prev.filter((f) => f.id !== id));

  // Advance running files through pipeline stages
  useEffect(() => {
    const i = setInterval(() => {
      setFiles((prev) => {
        const justDone = [];
        const next = prev.map((f) => {
          if (f.status !== 'running') return f;
          const ns = f.stage + 1;
          if (ns >= ingestStages.length) {
            const mode = f.mode || 'persist';
            // Only persist mode commits the fingerprint to the sync ledger
            if (mode === 'persist') justDone.push(fingerprint(f));
            if (mode === 'dry-run') return { ...f, status: 'preview', stage: ingestStages.length, records: Math.floor(Math.random() * 15) + 3 };
            if (mode === 'reindex') return { ...f, status: 'done', stage: ingestStages.length, records: f.records || Math.floor(Math.random() * 12) + 5 };
            return { ...f, status: 'done', stage: ingestStages.length, records: Math.floor(Math.random() * 18) + 4 };
          }
          return { ...f, stage: ns };
        });
        if (justDone.length) {
          setSyncLedger((prev) => {
            const n = new Set(prev);
            justDone.forEach((fp) => n.add(fp));
            return n;
          });
        }
        return next;
      });
    }, 600);
    return () => clearInterval(i);
  }, []);

  const runAll = () => {
    // Try real API ingest for files that have _file references
    setFiles((prev) => {
      const next = prev.map((f) => {
        if (f.status !== 'queued') return f;
          // Trigger real API ingest asynchronously
          ingestFileViaAPI(f).then((result) => {
            if (result && result.ok) {
              setFiles((cur) => cur.map((c) =>
                c.id === f.id ? { ...c, status: 'done', stage: 5, records: result.records } : c
              ));
              if (batchMode === 'persist') {
                setSyncLedger((prev) => {
                  const n = new Set(prev);
                  n.add(fingerprint(f));
                  return n;
                });
              }
            } else {
              setFiles((cur) => cur.map((c) =>
                c.id === f.id ? { ...c, status: 'error', stage: 0, records: 0 } : c
              ));
            }
          });
          return { ...f, status: 'running', stage: 1, mode: batchMode };
      });
      return next;
    });
  };

  // Mode actions: persist runs queued. dry-run runs queued without persist tag.
  // reindex re-runs done/preview files from the embed stage.
  const runMode = (m) => {
    setBatchMode(m);
    if (m === 'reindex') {
      setFiles((prev) => prev.map((f) =>
      f.status === 'done' || f.status === 'preview' ?
      { ...f, status: 'running', stage: 3, mode: 'reindex' } : f
      ));
    } else {
      setFiles((prev) => prev.map((f) =>
      f.status === 'queued' ? { ...f, status: 'running', stage: 1, mode: m } : f
      ));
    }
  };

  const clearDone = () => setFiles((prev) => prev.filter((f) => f.status !== 'done' && f.status !== 'preview'));

  const totalRecords = files.reduce((s, f) => s + f.records, 0);
  const done = files.filter((f) => f.status === 'done').length;
  const running = files.filter((f) => f.status === 'running').length;
  const demoCount = files.filter((f) => !f._file).length;
  const realCount = files.filter((f) => !!f._file).length;

  return (
    <div style={{ width, flexShrink: 0, overflow: 'hidden', transition: 'width 0.22s cubic-bezier(0.4,0,0.2,1)', background: '#030d20', borderRight: '1px solid rgba(47,99,255,0.15)', display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div style={{ padding: '7px 12px 0', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.12em', color: '#4f8cfb', borderBottom: '1px solid rgba(47,99,255,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <span>Ingest</span>
        <span style={{ color: '#7efdb9', fontSize: 9 }}>{done}/{files.length} done · {totalRecords} records{realCount > 0 && demoCount > 0 ? ` · ${realCount} API / ${demoCount} demo` : demoCount > 0 ? ` · [DEMO]` : ''}</span>
      </div>

      <div style={{ flex: 1, overflowY: 'auto' }}>

        {/* Auto-ingest banner */}
        <div style={{
          margin: '8px 12px 4px',
          padding: '8px 10px',
          borderRadius: 7,
          background: autoMode ? 'rgba(126,253,185,0.07)' : 'rgba(8,19,42,0.6)',
          border: `1px solid ${autoMode ? 'rgba(126,253,185,0.25)' : 'rgba(47,99,255,0.15)'}`,
          transition: 'all 0.2s',
          minWidth: 0, overflow: 'hidden'
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
            {/* Auto toggle */}
            <div onClick={() => setAutoMode((v) => !v)} style={{
              width: 34, height: 18, borderRadius: 9, flexShrink: 0, position: 'relative',
              background: autoMode ? '#7efdb9' : '#1a2540',
              border: `1px solid ${autoMode ? '#7efdb9' : '#274063'}`,
              cursor: 'pointer', transition: 'background 0.2s'
            }}>
              <div style={{
                position: 'absolute', top: 2, left: autoMode ? 16 : 2,
                width: 12, height: 12, borderRadius: '50%',
                background: autoMode ? '#020b1e' : '#274063',
                transition: 'left 0.2s'
              }} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontSize: 11, color: autoMode ? '#7efdb9' : '#5a7a9a', fontWeight: autoMode ? 500 : 400 }}>Auto-ingest</span>
                {autoMode && <span style={{ fontSize: 8, padding: '1px 5px', borderRadius: 3, background: 'rgba(126,253,185,0.1)', color: '#7efdb9', border: '1px solid rgba(126,253,185,0.2)', animation: 'pulse 1.5s ease-in-out infinite' }}>● live</span>}
              </div>
              <div style={{ fontSize: 9, color: '#274063', marginTop: 1 }}>
                Agent automatically ingests &amp; persists new data to DB
              </div>
              {/* Watch path row */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginTop: 6, padding: '4px 6px', background: 'rgba(8,19,42,0.6)', borderRadius: 4, border: '1px solid rgba(47,99,255,0.12)', minWidth: 0, overflow: 'hidden' }}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
                  <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" stroke="#4f8cfb" strokeWidth="1.5" />
                </svg>
                <input
                  value={watchPath}
                  onChange={(e) => setWatchPath(e.target.value)}
                  style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: autoMode ? '#7fe0ff' : '#5a7a9a', fontSize: 10, fontFamily: 'var(--font)', minWidth: 0 }} />

                <button
                  onClick={() => watchPickerRef.current?.click()}
                  title="Browse for watch directory"
                  style={{ background: 'none', border: 'none', color: '#7fe0ff', cursor: 'pointer', fontSize: 10, fontFamily: 'var(--font)', padding: '0 2px', flexShrink: 0, display: 'flex', alignItems: 'center' }}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                    <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" stroke="currentColor" strokeWidth="1.7" />
                    <path d="M9 13l3 3 3-3" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </button>
                <input ref={watchPickerRef} type="file" webkitdirectory="" directory="" multiple onChange={handleWatchPick} style={{ display: 'none' }} />
                <button
                  onClick={() => filePickerRef.current?.click()}
                  title="Browse for files (same as chat attach)"
                  style={{ background: 'none', border: 'none', color: '#274063', cursor: 'pointer', fontSize: 10, fontFamily: 'var(--font)', padding: '0 2px', flexShrink: 0, display: 'flex', alignItems: 'center' }}
                  onMouseEnter={(e) => e.currentTarget.style.color = '#7fe0ff'}
                  onMouseLeave={(e) => e.currentTarget.style.color = '#274063'}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                </button>
              </div>

              {/* Sync ledger row */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 6, padding: '4px 6px', background: 'rgba(8,19,42,0.6)', borderRadius: 4, border: '1px solid rgba(126,253,185,0.12)', minWidth: 0, overflow: 'hidden' }}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0 }}>
                  <path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 12a9 9 0 0 1 15-6.7L21 8M3 4v4h4M21 20v-4h-4" stroke="#7efdb9" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
                <div style={{ flex: 1, minWidth: 0, display: 'flex', alignItems: 'baseline', gap: 4, flexWrap: 'wrap', rowGap: 1, fontSize: 9, fontFamily: 'var(--font)' }}>
                  <span style={{ color: '#7efdb9' }}>Sync</span>
                  <span style={{ color: '#bfefff' }}>{syncLedger.size}</span>
                  <span style={{ color: '#5a7a9a' }}>indexed</span>
                  {skippedCount > 0 &&
                  <>
                      <span style={{ color: '#274063' }}>·</span>
                      <span style={{ color: '#f4d676' }}>{skippedCount}</span>
                      <span style={{ color: '#5a7a9a' }}>dup</span>
                    </>
                  }
                </div>
                <button onClick={resetSync} title="Clear sync ledger — allow re-ingestion" style={{ background: 'none', border: '1px solid rgba(47,99,255,0.15)', borderRadius: 3, color: '#5a7a9a', cursor: 'pointer', fontSize: 8, fontFamily: 'var(--font)', padding: '1px 5px', flexShrink: 0 }}>
                  reset
                </button>
              </div>
            </div>
          </div>

          {/* Auto log */}
          {autoMode && autoLog.length > 0 &&
          <div style={{ marginTop: 8, borderTop: '1px solid rgba(126,253,185,0.1)', paddingTop: 6, maxHeight: 80, overflowY: 'auto' }}>
              {autoLog.slice(-5).map((l, i) =>
            <div key={i} style={{ display: 'flex', gap: 6, fontSize: 9, lineHeight: 1.5 }}>
                  <span style={{ color: '#274063', flexShrink: 0 }}>{l.t}</span>
                  <span style={{ color: l.kind === 'ok' ? '#7efdb9' : '#4f8cfb' }}>{l.msg}</span>
                </div>
            )}
            </div>
          }
        </div>

        {/* Drop zone */}
        <div
          onDragOver={(e) => {e.preventDefault();setDragOver(true);}}
          onDragLeave={() => setDragOver(false)}
          onDrop={(e) => {
            e.preventDefault();
            setDragOver(false);
            const dropped = Array.from(e.dataTransfer.files || []);
            if (dropped.length === 0) {addDemoFile();return;}
            const incoming = dropped.map((f, i) => ({
              id: 'drop-' + Date.now() + '-' + i,
              name: f.name,
              size: (f.size / 1024).toFixed(1) + ' KB',
              status: 'queued', stage: 0, records: 0,
              _file: f  // Keep reference for real API ingest
            }));
            const { fresh } = dedupe(incoming);
            setFiles((prev) => [...prev, ...fresh]);
          }}
          onClick={() => filePickerRef.current?.click()}
          style={{
            margin: '6px 12px 8px', borderRadius: 8, cursor: 'pointer',
            border: `1px dashed ${dragOver ? '#7fe0ff' : 'rgba(79,140,251,0.25)'}`,
            background: dragOver ? 'rgba(127,224,255,0.06)' : 'rgba(8,19,42,0.5)',
            padding: '14px 12px', textAlign: 'center',
            transition: 'all 0.15s'
          }}>
          <input ref={filePickerRef} type="file" multiple onChange={handleFilePick} style={{ display: 'none' }} />
          <div style={{ fontSize: 11, color: dragOver ? '#7fe0ff' : '#4f6888', marginBottom: 3 }}>
            {dragOver ? 'Drop to add' : '+ Drop files or click to browse'}
          </div>
          <div style={{ fontSize: 9, color: '#274063' }}>txt · md · py · json · yaml · toml · any text file</div>
        </div>

        {/* Batch options — mode picker + actions */}
        <div style={{ padding: '0 12px 8px', display: 'flex', flexDirection: 'column', gap: 6 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 9, color: '#4f6888', textTransform: 'uppercase', letterSpacing: '0.07em', marginRight: 4 }}>Mode</span>
            {[
            { id: 'persist', label: 'persist', desc: 'write MIRL records to SQLite' },
            { id: 'dry-run', label: 'dry-run', desc: 'parse + preview, do not write' },
            { id: 'reindex', label: 'reindex', desc: 're-embed vectors for done files' }].
            map((m) =>
            <button key={m.id} onClick={() => setBatchMode(m.id)} title={m.desc} style={{
              padding: '3px 8px', fontSize: 9, borderRadius: 3, cursor: 'pointer', fontFamily: 'var(--font)',
              background: batchMode === m.id ? 'rgba(127,224,255,0.1)' : 'transparent',
              border: `1px solid ${batchMode === m.id ? 'rgba(127,224,255,0.3)' : 'rgba(47,99,255,0.15)'}`,
              color: batchMode === m.id ? '#7fe0ff' : '#4f6888'
            }}>{m.label}</button>
            )}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexWrap: 'wrap' }}>
            <button onClick={() => runMode(batchMode)} title={`Run all queued files in ${batchMode} mode`} style={{
              padding: '3px 10px', fontSize: 9, borderRadius: 4, cursor: 'pointer', fontFamily: 'var(--font)',
              background: 'rgba(126,253,185,0.1)', border: '1px solid rgba(126,253,185,0.3)', color: '#7efdb9'
            }}>▶ Run {batchMode}</button>
            <button onClick={clearDone} title="Remove completed files from list" style={{
              padding: '3px 8px', fontSize: 9, borderRadius: 4, cursor: 'pointer', fontFamily: 'var(--font)',
              background: 'rgba(79,140,251,0.08)', border: '1px solid rgba(79,140,251,0.2)', color: '#4f8cfb'
            }}>clear done</button>
            <button onClick={() => filePickerRef.current?.click()} title="Browse and add files" style={{
              padding: '3px 8px', fontSize: 9, borderRadius: 4, cursor: 'pointer', fontFamily: 'var(--font)',
              background: 'rgba(79,140,251,0.08)', border: '1px solid rgba(79,140,251,0.2)', color: '#4f8cfb'
            }}>+ browse</button>
          </div>
        </div>

        {/* Pipeline stages legend */}
        <div style={{ padding: '0 12px 8px', display: 'flex', alignItems: 'center', gap: 0, overflowX: 'auto' }}>
          {ingestStages.map((s, i) =>
          <React.Fragment key={s}>
              <div style={{ fontSize: 8, color: '#274063', whiteSpace: 'nowrap', padding: '2px 4px' }}>{i + 1}. {s}</div>

function ProvenanceGraph({ nodes, edges, highlight, onHover }) {
  const nodeMap = Object.fromEntries(nodes.map((n) => [n.id, n]));
  return (
    <svg width="100%" height="220" viewBox="0 0 640 220" style={{ display: 'block' }}>
      <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#1a2540" />
        </marker>
      </defs>
      {/* edges */}
      {edges.map((e, i) => {
        const a = nodeMap[e.from],b = nodeMap[e.to];
        if (!a || !b) return null;
        const isHot = highlight === e.from || highlight === e.to;
        return (
          <line key={i}
          x1={a.x} y1={a.y} x2={b.x} y2={b.y}
          stroke={isHot ? '#4f8cfb' : '#1a2540'}
          strokeWidth={isHot ? 1.5 : 1}
          strokeOpacity={isHot ? 0.8 : 0.4}
          markerEnd="url(#arrow)" />);


      })}
      {/* nodes */}
      {nodes.map((n) => {
        const isHot = highlight === n.id;
        return (
          <g key={n.id} onMouseEnter={() => onHover(n.id)} onMouseLeave={() => onHover(null)} style={{ cursor: 'pointer' }}>
            <circle cx={n.x} cy={n.y} r={isHot ? 22 : 18}
            fill={isHot ? n.color + '22' : '#08132a'}
            stroke={n.color}
            strokeWidth={isHot ? 2 : 1}
            style={{ filter: isHot ? `drop-shadow(0 0 6px ${n.color})` : 'none', transition: 'all 0.15s' }} />

            <text x={n.x} y={n.y + 1} textAnchor="middle" dominantBaseline="middle"
            fontSize="8" fill={n.color} fontFamily="JetBrains Mono, monospace" fontWeight="500">
              {n.label.length > 10 ? n.label.slice(0, 10) + '…' : n.label}
            </text>
            <text x={n.x} y={n.y + 30} textAnchor="middle" fontSize="7" fill="#274063" fontFamily="JetBrains Mono, monospace">
              {n.type}
            </text>
          </g>);

      })}
    </svg>);

}

      try {
        const stats = await window.SeamAPI.stats();

      } catch (_) { /* silent */ }
      try {
        const result = await window.SeamAPI.search('*', 10);
        if (!cancelled && result.candidates && result.candidates.length > 0) {
          const mapped = result.candidates.map((c) => {
            const r = c.record || {};
            const tag = r.kind === 'entity' ? '@' : r.kind === 'claim' ? '#' : r.kind === 'state' ? '~' : r.kind === 'event' ? '!' : r.kind === 'relation' ? '>' : '@';

// Build a comprehensive run log from each suite's run history — every suite contributes
// its previous runs, so adding new suites automatically expands the log.
function buildInitialRunLog() {
  const log = [];
  const now = Date.now();
  benchmarkSuites.forEach((suite, suiteIdx) => {
    // First entry = today's "live" run (current value)
    const offset = suiteIdx * 47000 + Math.floor(Math.random() * 18000);
    const t = new Date(now - offset);
    const isGoodUp = !['latency', 'drift', 'contra'].includes(suite.id);
    const improved = isGoodUp ? suite.value > suite.prev : suite.value < suite.prev;
    const deltaRaw = (suite.value - suite.prev) / suite.prev * 100;
    log.push({
      time: t.toLocaleTimeString('en-US', { hour12: false }).slice(0, 8),
      date: t.toISOString().slice(0, 10),
      suite: suite.id,
      suiteName: suite.name,
      category: suite.category,
      result: suite.status === 'pass' ? 'PASS' : suite.status === 'warn' ? 'WARN' : 'FAIL',
      delta: (deltaRaw > 0 ? '+' : '') + deltaRaw.toFixed(1) + '%',
      value: suite.value,
      unit: suite.unit,
      improved,
      hash: (suite.id.slice(0, 3) + Math.random().toString(36).slice(2, 7)).toLowerCase()
    });
  });
  return log.sort((a, b) => a.date + a.time < b.date + b.time ? 1 : -1);
}

function SparkLine({ data, color, width = 120, height = 32 }) {
  const min = Math.min(...data),max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = i / (data.length - 1) * width;
    const y = height - (v - min) / range * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts.split(' ').pop().split(',')[0]} cy={pts.split(' ').pop().split(',')[1]} r="2.5" fill={color} />
    </svg>);

}
