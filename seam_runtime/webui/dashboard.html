function CyberBarChart({ data, color, maxVal }) {
  return (
    <svg width="100%" height="120" viewBox={`0 0 ${data.length * 36} 120`} preserveAspectRatio="none" style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`grad-${color.replace('#', '')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.9" />
          <stop offset="100%" stopColor={color} stopOpacity="0.1" />
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="coloredBlur" />
          <feMerge><feMergeNode in="coloredBlur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      {data.map((v, i) => {
        const h = v / maxVal * 100;
        const x = i * 36 + 4;
        return (
          <g key={i} filter="url(#glow)">
            <rect x={x} y={120 - h} width={28} height={h}
            fill={`url(#grad-${color.replace('#', '')})`}
            stroke={color} strokeWidth="1" rx="2" />
            <line x1={x} y1={120 - h} x2={x + 28} y2={120 - h} stroke={color} strokeWidth="1.5" opacity="0.8" />
          </g>);

      })}
    </svg>);

}

function CyberSparkFull({ data, color, width = 300, height = 60 }) {
  const min = Math.min(...data),max = Math.max(...data),range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = i / (data.length - 1) * (width - 8) + 4;
    const y = height - (v - min) / range * (height - 12) - 6;
    return `${x},${y}`;
  }).join(' ');
  const areaBottom = height;
  const firstPt = pts.split(' ')[0];
  const lastPt = pts.split(' ').pop();
  const [lx] = lastPt.split(',');
  const [fx] = firstPt.split(',');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={`sparkfill-${color.replace('#', '')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
        <filter id="sparkglow">
          <feGaussianBlur stdDeviation="1.5" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
      </defs>
      <polygon points={`${pts} ${lx},${areaBottom} ${fx},${areaBottom}`}
      fill={`url(#sparkfill-${color.replace('#', '')})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2"
      strokeLinejoin="round" strokeLinecap="round" filter="url(#sparkglow)" />
      {data.map((v, i) => {
        const x = i / (data.length - 1) * (width - 8) + 4;
        const y = height - (v - min) / range * (height - 12) - 6;
        return <circle key={i} cx={x} cy={y} r={i === data.length - 1 ? 3.5 : 1.5} fill={color} opacity={i === data.length - 1 ? 1 : 0.4} />;
      })}
    </svg>);

}

                    <span style={{ fontSize: 9, padding: '1px 6px', borderRadius: 3, background: r.result === 'PASS' ? 'rgba(126,253,185,0.1)' : r.result === 'WARN' ? 'rgba(244,214,118,0.1)' : 'rgba(255,107,107,0.1)', color: r.result === 'PASS' ? '#7efdb9' : r.result === 'WARN' ? '#f4d676' : '#ff6b6b', border: `1px solid ${r.result === 'PASS' ? 'rgba(126,253,185,0.2)' : r.result === 'WARN' ? 'rgba(244,214,118,0.2)' : 'rgba(255,107,107,0.2)'}` }}>{r.result}</span>
                  </span>
                  <span style={{ textAlign: 'right', fontSize: 9, color: '#274063', fontFamily: 'monospace' }}>#{r.hash}</span>
                </div>);

            })}
          </div>
        </div>
        }

      </div>
    </div>);

}


// ── MemoryFullView ─────────────────────────────────────────────────────────
// ── Obsidian-style force-directed provenance graph ──────────────────────
function ObsidianGraph({ records, sources, baseEdges, onSelectNode, selectedId, externalHovered, height = 480 }) {
  const containerRef = React.useRef(null);
  const svgRef = React.useRef(null);
  const [size, setSize] = React.useState({ w: 900, h: height });
  const [transform, setTransform] = React.useState({ x: 450, y: height / 2, k: 1 });
  const [localHovered, setLocalHovered] = React.useState(null);
  const hovered = localHovered || externalHovered;
  const setHovered = setLocalHovered;
  const [dragNode, setDragNode] = React.useState(null);
  const [panning, setPanning] = React.useState(false);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  // Pulse counter used for flowing-data animation along hot edges
  const [pulse, setPulse] = React.useState(0);
  React.useEffect(() => {
    if (!hovered && !selectedId) return;
    const i = setInterval(() => setPulse((p) => p + 1), 60);
    return () => clearInterval(i);
  }, [hovered, selectedId]);

  // ── Force-simulation parameters (Obsidian-style settings) ─────────────
  const [forces, setForces] = React.useState({
    repel: 1400, // node-to-node repulsion
    linkForce: 0.012, // spring stiffness along edges
    linkDistance: 90, // ideal edge length
    center: 0.002, // pull toward center
    friction: 0.86, // velocity damping per tick
    traceDepth: 2 // hops to highlight from selected/hovered
  });
  const forcesRef = React.useRef(forces);
  React.useEffect(() => {forcesRef.current = forces;}, [forces]);

  // ── Alpha cooling — simulation stabilizes & sleeps ────────────────────
  const alphaRef = React.useRef(1);
  const sleepingRef = React.useRef(false);
  const kickAlpha = React.useCallback((v = 0.6) => {
    alphaRef.current = Math.max(alphaRef.current, v);
    sleepingRef.current = false;
  }, []);

  // ── Build nodes & edges from records + sources ─────────────────────────
  const { nodes, edges } = React.useMemo(() => {
    const sourceNodes = sources.map((s) => ({
      id: s.id, label: s.name, kind: 'source', color: '#f4d676', size: 14, weight: 6
    }));
    const recordNodes = records.map((r) => ({
      id: r.id, label: r.id + ' ' + r.tag,
      kind: r.kind, color: tagColors[r.tag] || '#7fe0ff',
      size: 8 + r.score * 6, weight: 3,
      record: r
    }));
    const allNodes = [...sourceNodes, ...recordNodes];

    // Base provenance edges
    const eds = [...baseEdges];

    // Derive edges from records: claims → state, evidence → source, etc.
    records.forEach((r) => {
      if (r.tag === '#' || r.tag === '@') {
        // Claims & entities link to nearest source
        const src = sources[Math.floor(Math.random() * sources.length)];
        if (src) eds.push({ from: src.id, to: r.id, kind: 'derived_from' });
      }
      if (r.tag === '^') {
        // Evidence links to the spec source
        const spec = sources.find((s) => s.name && s.name.includes('SPEC'));
        if (spec) eds.push({ from: spec.id, to: r.id, kind: 'evidence_for' });
      }
      if (r.tag === '>') {
        // Relations link to entities they mention
        const ents = recordNodes.filter((n) => n.kind === 'entity').slice(0, 2);
        ents.forEach((e) => eds.push({ from: r.id, to: e.id, kind: 'relates_to' }));
      }
      if (r.tag === '~') {
        // States derive from claims
        const clms = recordNodes.filter((n) => n.kind === 'claim').slice(0, 1);
        clms.forEach((c) => eds.push({ from: c.id, to: r.id, kind: 'state_of' }));
      }
    });

    return { nodes: allNodes, edges: eds };
  }, [records, sources, baseEdges]);

  // Live physics simulation
  const simNodes = React.useRef([]);
  const simEdges = React.useRef([]);
  React.useEffect(() => {
    // Reseed positions when node set changes but preserve existing
    const prevById = new Map(simNodes.current.map((n) => [n.id, n]));
    simNodes.current = nodes.map((n) => {
      const prev = prevById.get(n.id);
      return {
        ...n,
        x: prev ? prev.x : (Math.random() - 0.5) * 400,
        y: prev ? prev.y : (Math.random() - 0.5) * 300,
        vx: prev ? prev.vx : 0,
        vy: prev ? prev.vy : 0,
        fx: prev ? prev.fx : null,
        fy: prev ? prev.fy : null
      };
    });
    simEdges.current = edges;
    kickAlpha(0.8); // restart cooling when topology changes
  }, [nodes, edges, kickAlpha]);

  const [, force] = React.useReducer((x) => x + 1, 0);
  React.useEffect(() => {
    let raf;
    const step = () => {
      const ns = simNodes.current;
      const es = simEdges.current;
      const p = forcesRef.current;
      // Cool the simulation
      if (!dragNode) alphaRef.current *= 0.992;
      if (alphaRef.current < 0.005) {sleepingRef.current = true;alphaRef.current = 0;}
      const alpha = alphaRef.current;
      const byId = new Map(ns.map((n) => [n.id, n]));

      if (!sleepingRef.current || dragNode) {
        // Repulsion
        for (let i = 0; i < ns.length; i++) {
          for (let j = i + 1; j < ns.length; j++) {
            const a = ns[i],b = ns[j];
            const dx = b.x - a.x,dy = b.y - a.y;
            const d2 = dx * dx + dy * dy + 0.1;
            const d = Math.sqrt(d2);
            const f = p.repel * alpha / d2;
            const fx = dx / d * f,fy = dy / d * f;
            if (a.fx == null) {a.vx -= fx;a.vy -= fy;}
            if (b.fx == null) {b.vx += fx;b.vy += fy;}
          }
        }
        // Spring along edges
        for (const e of es) {
          const a = byId.get(e.from),b = byId.get(e.to);
          if (!a || !b) continue;
          const dx = b.x - a.x,dy = b.y - a.y;
          const d = Math.sqrt(dx * dx + dy * dy) + 0.01;
          const f = (d - p.linkDistance) * p.linkForce * alpha;
          const fx = dx / d * f,fy = dy / d * f;
          if (a.fx == null) {a.vx += fx;a.vy += fy;}
          if (b.fx == null) {b.vx -= fx;b.vy -= fy;}
        }
        // Center attractor + integrate
        for (const n of ns) {
          if (n.fx != null) {n.x = n.fx;n.y = n.fy;n.vx = 0;n.vy = 0;continue;}
          n.vx -= n.x * p.center * alpha;
          n.vy -= n.y * p.center * alpha;
          n.vx *= p.friction;n.vy *= p.friction;
          // Cap velocity for stability
          const sp = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
          if (sp > 8) {n.vx = n.vx / sp * 8;n.vy = n.vy / sp * 8;}
          n.x += n.vx;
          n.y += n.vy;
        }
      }
      force();
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [dragNode]);

  // Resize observer
  React.useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver((entries) => {
      const r = entries[0].contentRect;
      setSize({ w: r.width, h: height });
      setTransform((t) => ({ ...t, x: r.width / 2, y: height / 2 }));
    });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, [height]);

  // Mouse coords → world
  const toWorld = (e) => {
    const rect = svgRef.current.getBoundingClientRect();
    const sx = e.clientX - rect.left,sy = e.clientY - rect.top;
    return { x: (sx - transform.x) / transform.k, y: (sy - transform.y) / transform.k };
  };

  // Adjacency for highlight (multi-hop traces)
  const adjacency = React.useMemo(() => {
    const m = new Map();
    nodes.forEach((n) => m.set(n.id, new Set()));
    edges.forEach((e) => {m.get(e.from)?.add(e.to);m.get(e.to)?.add(e.from);});
    return m;
  }, [nodes, edges]);
  const tracedSet = React.useMemo(() => {
    const hot = hovered || selectedId;
    if (!hot) return null;
    const set = new Set([hot]);
    let frontier = [hot];
    for (let d = 0; d < forces.traceDepth; d++) {
      const next = [];
      for (const id of frontier) {
        const ns = adjacency.get(id);
        if (!ns) continue;
        for (const nb of ns) if (!set.has(nb)) {set.add(nb);next.push(nb);}
      }
      frontier = next;
      if (!frontier.length) break;
    }
    return set;
  }, [hovered, selectedId, adjacency, forces.traceDepth]);
  const hot = hovered || selectedId;
  const hotSet = tracedSet;

  return (
    <div ref={containerRef} style={{ position: 'relative', height, background: 'rgba(2,6,19,0.95)', border: '1px solid rgba(47,99,255,0.15)', borderRadius: 12, overflow: 'hidden' }}>
      {/* Scanline overlay */}
      <div style={{ position: 'absolute', inset: 0, background: 'repeating-linear-gradient(to bottom, rgba(255,255,255,0.012) 0, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 4px)', pointerEvents: 'none', zIndex: 2 }} />

      {/* HUD */}
      <div style={{ position: 'absolute', top: 10, left: 12, zIndex: 3, display: 'flex', gap: 8, alignItems: 'center', fontSize: 10, color: '#5a7a9a', fontFamily: 'var(--font)' }}>
        <span style={{ color: '#7fe0ff' }}>◉</span>
        <span>{nodes.length} nodes</span>
        <span style={{ color: '#274063' }}>·</span>
        <span>{edges.length} edges</span>
        <span style={{ color: '#274063' }}>·</span>
        <span>zoom {transform.k.toFixed(2)}×</span>
      </div>
      <div style={{ position: 'absolute', top: 10, right: 12, zIndex: 3, display: 'flex', gap: 4 }}>
        {[['+', () => setTransform((t) => ({ ...t, k: Math.min(3, t.k * 1.2) }))],
        ['−', () => setTransform((t) => ({ ...t, k: Math.max(0.3, t.k / 1.2) }))],
        ['⊙', () => setTransform({ x: size.w / 2, y: size.h / 2, k: 1 })],
        ['↻', () => kickAlpha(1)],
        ['⚙', () => setSettingsOpen((v) => !v)]].map(([label, action]) =>
        <button key={label} onClick={action} style={{ width: 24, height: 24, background: settingsOpen && label === '⚙' ? 'rgba(127,224,255,0.18)' : 'rgba(8,19,42,0.85)', border: '1px solid rgba(127,224,255,0.2)', color: '#7fe0ff', borderRadius: 4, cursor: 'pointer', fontFamily: 'var(--font)', fontSize: 12, lineHeight: 1 }}>{label}</button>
        )}
      </div>

      {/* Settings panel — Obsidian-style float */}
      {settingsOpen &&
      <div style={{
        position: 'absolute', top: 42, right: 12, zIndex: 5,
        width: 260, background: 'rgba(3,13,32,0.96)', backdropFilter: 'blur(10px)',
        border: '1px solid rgba(127,224,255,0.25)', borderRadius: 8,
        boxShadow: '0 12px 40px rgba(0,0,0,0.6)', padding: '12px 14px',
        fontFamily: 'var(--font)'
      }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, paddingBottom: 8, borderBottom: '1px solid rgba(47,99,255,0.15)' }}>
            <span style={{ color: '#7fe0ff', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600 }}>Graph forces</span>
            <div style={{ flex: 1 }} />
            <button onClick={() => setSettingsOpen(false)} style={{ background: 'none', border: 'none', color: '#5a7a9a', cursor: 'pointer', fontSize: 14, lineHeight: 1 }}>×</button>
          </div>
          {[
        { key: 'repel', label: 'Repel force', min: 200, max: 4000, step: 50, c: '#9b6cff' },
        { key: 'linkForce', label: 'Link strength', min: 0, max: 0.05, step: 0.002, c: '#7fe0ff' },
        { key: 'linkDistance', label: 'Link distance', min: 30, max: 200, step: 5, c: '#f4d676' },
        { key: 'center', label: 'Center force', min: 0, max: 0.01, step: 0.0005, c: '#7efdb9' },
        { key: 'friction', label: 'Friction', min: 0.5, max: 0.99, step: 0.01, c: '#d391ff' },
        { key: 'traceDepth', label: 'Trace depth', min: 1, max: 5, step: 1, c: '#66b8ff' }].
        map((f) =>
        <div key={f.key} style={{ marginBottom: 10 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, marginBottom: 4 }}>
                <span style={{ color: '#8090b0' }}>{f.label}</span>
                <span style={{ color: f.c }}>{typeof forces[f.key] === 'number' ? f.step < 1 ? forces[f.key].toFixed(3) : forces[f.key] : forces[f.key]}{f.key === 'traceDepth' ? ' hops' : ''}</span>
              </div>
              <input type="range" min={f.min} max={f.max} step={f.step} value={forces[f.key]}
          onChange={(e) => {setForces((prev) => ({ ...prev, [f.key]: +e.target.value }));kickAlpha(0.5);}}
          style={{ width: '100%', accentColor: f.c, height: 4 }} />
            </div>
        )}
          <div style={{ display: 'flex', gap: 6, marginTop: 10, paddingTop: 8, borderTop: '1px solid rgba(47,99,255,0.1)' }}>
            <button onClick={() => {setForces({ repel: 1400, linkForce: 0.012, linkDistance: 90, center: 0.002, friction: 0.86, traceDepth: 2 });kickAlpha(1);}}
          style={{ flex: 1, padding: '5px 8px', background: 'rgba(79,140,251,0.08)', border: '1px solid rgba(79,140,251,0.25)', borderRadius: 4, color: '#7fe0ff', fontSize: 10, fontFamily: 'var(--font)', cursor: 'pointer' }}>
              reset defaults
            </button>
            <button onClick={() => {
            // Release all fixed nodes (un-pin all manually placed nodes)
            simNodes.current.forEach((n) => {n.fx = null;n.fy = null;});
            kickAlpha(1);
          }}
          style={{ flex: 1, padding: '5px 8px', background: 'rgba(126,253,185,0.08)', border: '1px solid rgba(126,253,185,0.25)', borderRadius: 4, color: '#7efdb9', fontSize: 10, fontFamily: 'var(--font)', cursor: 'pointer' }}>
              unpin all
            </button>
          </div>
        </div>
      }
      <div style={{ position: 'absolute', bottom: 10, left: 12, zIndex: 3, fontSize: 9, color: '#274063', fontStyle: 'italic' }}>
        drag nodes · scroll to zoom · drag bg to pan · click node for details
      </div>

      <svg ref={svgRef}
      width={size.w} height={size.h}
      style={{ display: 'block', position: 'absolute', inset: 0, cursor: panning ? 'grabbing' : 'grab' }}
      onWheel={(e) => {
        e.preventDefault();
        const factor = e.deltaY < 0 ? 1.1 : 0.9;
        const w = toWorld(e);
        setTransform((t) => {
          const k = Math.max(0.3, Math.min(3, t.k * factor));
          return { k, x: e.clientX - svgRef.current.getBoundingClientRect().left - w.x * k, y: e.clientY - svgRef.current.getBoundingClientRect().top - w.y * k };
        });
      }}
      onMouseDown={(e) => {if (e.target === svgRef.current || e.target.tagName === 'rect') setPanning(true);}}
      onMouseUp={() => {setPanning(false);setDragNode(null);}}
      onMouseLeave={() => {setPanning(false);setDragNode(null);}}
      onMouseMove={(e) => {
        if (dragNode) {
          const w = toWorld(e);
          const node = simNodes.current.find((n) => n.id === dragNode);
          if (node) {node.fx = w.x;node.fy = w.y;node.x = w.x;node.y = w.y;}
        } else if (panning) {
          setTransform((t) => ({ ...t, x: t.x + e.movementX, y: t.y + e.movementY }));
        }
      }}>
        <defs>
          <radialGradient id="bgGlow"><stop offset="0%" stopColor="rgba(127,224,255,0.04)" /><stop offset="100%" stopColor="transparent" /></radialGradient>
          <filter id="nodeGlow"><feGaussianBlur stdDeviation="2.5" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
        </defs>
        <rect x="0" y="0" width={size.w} height={size.h} fill="url(#bgGlow)" />

        <g transform={`translate(${transform.x},${transform.y}) scale(${transform.k})`}>
          {/* Edges */}
          {simEdges.current.map((e, i) => {
            const a = simNodes.current.find((n) => n.id === e.from);
            const b = simNodes.current.find((n) => n.id === e.to);
            if (!a || !b) return null;
            const isHot = hot && (e.from === hot || e.to === hot);
            const isDim = hot && !isHot;
            const edgeColor = a.color || '#7fe0ff';
            return (
              <g key={i}>
                {/* Base edge */}
                <line x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                stroke={isHot ? edgeColor : '#1a2540'}
                strokeWidth={isHot ? 1.8 / transform.k : 0.7 / transform.k}
                strokeOpacity={isDim ? 0.08 : isHot ? 0.5 : 0.35} />
                {/* Animated overlay — flowing data pulse */}
                {isHot &&
                <line x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                stroke={edgeColor}
                strokeWidth={2.5 / transform.k}
                strokeOpacity={0.9}
                strokeDasharray={`${6 / transform.k} ${20 / transform.k}`}
                strokeDashoffset={-(pulse * (3 / transform.k)) % (26 / transform.k)}
                style={{ filter: `drop-shadow(0 0 4px ${edgeColor})` }} />
                }
              </g>);

          })}
          {/* Nodes */}
          {simNodes.current.map((n) => {
            const isHovered = hovered === n.id;
            const isSelected = selectedId === n.id;
            const isHot = hotSet?.has(n.id);
            const isDim = hot && !isHot;
            const r = n.size + (isSelected ? 4 : isHovered ? 2 : 0);
            return (
              <g key={n.id}
              onMouseEnter={() => setHovered(n.id)}
              onMouseLeave={() => setHovered(null)}
              onMouseDown={(e) => {e.stopPropagation();setDragNode(n.id);kickAlpha(0.6);}}
              onDoubleClick={() => {const node = simNodes.current.find((x) => x.id === n.id);if (node) {node.fx = null;node.fy = null;}}}
              onClick={(e) => {e.stopPropagation();onSelectNode(isSelected ? null : n.id);}}
              style={{ cursor: 'pointer' }}>
                {(isHovered || isSelected) && <circle cx={n.x} cy={n.y} r={r + 8} fill="none" stroke={n.color} strokeWidth={1 / transform.k} opacity={0.3} />}
                <circle cx={n.x} cy={n.y} r={r}
                fill={n.color + (isHot ? 'cc' : '99')}
                stroke={n.color}
                strokeWidth={isSelected ? 2.5 / transform.k : 1 / transform.k}
                opacity={isDim ? 0.25 : 1}
                filter={isHovered || isSelected ? 'url(#nodeGlow)' : 'none'} />
                {(transform.k > 0.7 || isHovered || isSelected) &&
                <text x={n.x} y={n.y + r + 9 / transform.k} textAnchor="middle"
                fontSize={9 / transform.k} fill={isDim ? '#274063' : isHovered || isSelected ? n.color : '#8090b0'}
                fontFamily="JetBrains Mono, monospace"
                style={{ pointerEvents: 'none', userSelect: 'none' }}>
                    {n.label.length > 14 ? n.label.slice(0, 14) + '…' : n.label}
                  </text>
                }
              </g>);

          })}
        </g>
      </svg>
    </div>);

}

// ── SystemResources tab — live OS-level resource monitor ─────────────────
function SystemResources() {
  // What the browser actually exposes (real values)
  const cores = navigator.hardwareConcurrency || 8;
  const deviceMemoryGB = navigator.deviceMemory || 16;
  const platform = navigator.platform || 'unknown';
  const ua = navigator.userAgent || '';
  const detectOs = () => {
    if (/Mac/i.test(ua)) return 'macOS';
    if (/Win/i.test(ua)) return 'Windows';
    if (/Linux/i.test(ua)) return 'Linux';
    if (/Android/i.test(ua)) return 'Android';
    if (/iPhone|iPad/i.test(ua)) return 'iOS';
    return 'Unknown';
  };
  const os = detectOs();

  // Live state
  const [history, setHistory] = React.useState({ cpu: [], mem: [], net: [], disk: [], gpu: [] });
  const [now, setNow] = React.useState({ cpu: 12, mem: 38, net: 4, disk: 8, gpu: 6 });
  const [battery, setBattery] = React.useState(null);
  const [connection, setConnection] = React.useState({ type: 'wifi', downlink: 0, rtt: 0 });
  const [pageHeap, setPageHeap] = React.useState({ used: 0, total: 0, limit: 0 });

  React.useEffect(() => {
    // Battery API (Chrome / some browsers)
    if (navigator.getBattery) navigator.getBattery().then((b) => {
      const update = () => setBattery({ level: Math.round(b.level * 100), charging: b.charging, time: b.dischargingTime });
      update();
      b.addEventListener('levelchange', update);
      b.addEventListener('chargingchange', update);
    });
    // Network Information API
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (conn) {
      const update = () => setConnection({ type: conn.effectiveType || conn.type, downlink: conn.downlink, rtt: conn.rtt });
      update();
      conn.addEventListener && conn.addEventListener('change', update);
    }
  }, []);

  // Live OS metrics polling
  React.useEffect(() => {
    let cpuBase = 12, memBase = 38, netBase = 4, diskBase = 8, gpuBase = 6;
    const i = setInterval(() => {
      window.SeamAPI.sysMetrics().then((metrics) => {
        const drift = () => (Math.random() - 0.5) * 4;
        // /sys-metrics returns per-metric {value, source, error}; extract value, fall back to last-known live baseline
        const pick = (m, fallback) => (m && typeof m.value === 'number') ? m.value : fallback;
        const cpuVal = pick(metrics.cpu, cpuBase);
        const memVal = pick(metrics.mem, memBase);
        const diskVal = pick(metrics.disk, diskBase);
        cpuBase = cpuVal; memBase = memVal; diskBase = diskVal;
        const newPoint = {
          cpu: cpuVal,
          mem: memVal,
          net: Math.max(0, Math.min(40, netBase + drift() * 1.5 + (Math.random() < 0.2 ? Math.random() * 8 : 0))), // /sys-metrics reports net as unsupported; UI still simulates until a real backend lands
          disk: diskVal,
          gpu: Math.max(0, Math.min(100, gpuBase + drift() * 1.8 + (Math.random() < 0.05 ? Math.random() * 40 : 0))) // same: gpu reported unsupported by backend
        };
        netBase = newPoint.net; gpuBase = newPoint.gpu;
        setNow(newPoint);
        setHistory((prev) => ({
          cpu: [...prev.cpu, newPoint.cpu].slice(-60),
          mem: [...prev.mem, newPoint.mem].slice(-60),
          net: [...prev.net, newPoint.net].slice(-60),
          disk: [...prev.disk, newPoint.disk].slice(-60),
          gpu: [...prev.gpu, newPoint.gpu].slice(-60)
        }));
      }).catch(() => { /* ignore on disconnect */ });
      // Real JS heap if available (Chrome only)
      if (performance.memory) {
        setPageHeap({
          used: performance.memory.usedJSHeapSize,
          total: performance.memory.totalJSHeapSize,
          limit: performance.memory.jsHeapSizeLimit
        });
      }
    }, 1000);
    return () => clearInterval(i);
  }, []);

  const fmtBytes = (b) => {
    if (b === 0) return '—';
    const u = ['B', 'KB', 'MB', 'GB', 'TB'];
    let i = 0;let n = b;
    while (n >= 1024 && i < u.length - 1) {n /= 1024;i++;}
    return n.toFixed(1) + ' ' + u[i];
  };

  // Live area chart
  const LiveChart = ({ data, color, maxV = 100, height = 50 }) => {
    if (data.length < 2) return <div style={{ height, background: 'rgba(8,19,42,0.4)', borderRadius: 3 }} />;
    const w = 280;
    const pts = data.map((v, i) => `${i / (data.length - 1) * w},${height - v / maxV * (height - 4) - 2}`).join(' ');
    const last = data[data.length - 1];
    return (
      <svg width="100%" viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none" style={{ display: 'block' }}>
        <defs>
          <linearGradient id={`g-${color.slice(1)}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.35" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        <polygon points={`0,${height} ${pts} ${w},${height}`} fill={`url(#g-${color.slice(1)})`} />
        <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" />
        {data.length > 0 && (() => {
          const x = w;
          const y = height - last / maxV * (height - 4) - 2;
          return <circle cx={x} cy={y} r="2.5" fill={color} style={{ filter: `drop-shadow(0 0 4px ${color})` }} />;
        })()}
      </svg>);

  };

  const MetricCard = ({ label, value, unit, color, history: hist, max = 100, sub }) =>
  <div style={{ background: 'rgba(8,19,42,0.85)', border: `1px solid ${color}25`, borderRadius: 8, padding: '12px 14px' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 4 }}>
        <span style={{ fontSize: 10, color: '#5a7a9a', textTransform: 'uppercase', letterSpacing: '0.09em', flex: 1 }}>{label}</span>
        <span style={{ fontSize: 9, color: '#274063' }}>{sub}</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 4, marginBottom: 6 }}>
        <span style={{ fontSize: 22, color: color, fontWeight: 600, filter: `drop-shadow(0 0 6px ${color}60)` }}>{value}</span>
        <span style={{ fontSize: 11, color: '#5a7a9a' }}>{unit}</span>
      </div>
      <LiveChart data={hist} color={color} maxV={max} height={48} />
    </div>;


  const processes = [
  { name: 'seam-runtime', pid: 4128, cpu: now.cpu * 0.42, mem: 412, kind: 'daemon', color: '#7fe0ff' },
  { name: 'seam-refine', pid: 4129, cpu: now.cpu * 0.18, mem: 184, kind: 'agent', color: '#9b6cff' },
  { name: 'seam-vector', pid: 4130, cpu: now.cpu * 0.14, mem: 296, kind: 'index', color: '#d391ff' },
  { name: 'seam-rest', pid: 4131, cpu: now.cpu * 0.08, mem: 82, kind: 'api', color: '#f4d676' },
  { name: 'sqlite-wal', pid: 4135, cpu: now.cpu * 0.05, mem: 41, kind: 'db', color: '#7efdb9' },
  { name: 'python (this)', pid: 4127, cpu: now.cpu * 0.06, mem: Math.round(pageHeap.used / 1048576) || 64, kind: 'parent', color: '#66b8ff' }];

function MemoryFullView() {
  const [tab, setTab] = useState('graph');
  const [hoveredNode, setHoveredNode] = useState(null);
  const [selectedNode, setSelectedNode] = useState(null);
  const [recordHoverNode, setRecordHoverNode] = useState(null); // node ID hovered via a record card
  const [tick, setTick] = useState(0);
  // Live API stats for header badges
  const [liveStats, setLiveStats] = useState(null);
  const totalRecordsLabel = liveStats?.total_records != null
    ? `${(liveStats.total_records / 1000000).toFixed(2)}M records`
    : '1.41M records';

  // Live Graph Trace
  const [graphTrace, setGraphTrace] = useState({ nodes: [], edges: [] });
  useEffect(() => {
    let cancelled = false;
    const fetchTrace = async () => {
      try {
        // Try to trace from 'ent:seam' as a hub node
        const data = await window.SeamAPI.trace('ent:seam');
        if (!cancelled && data && data.nodes) {
          setGraphTrace({
            nodes: data.nodes.map(n => ({
              id: n.id,
              label: n.id,
              kind: n.kind,
              color: tagColors[n.kind === 'entity' ? '@' : n.kind === 'claim' ? '#' : n.kind === 'event' ? '!' : n.kind === 'relation' ? '>' : n.kind === 'state' ? '~' : '^'] || '#7fe0ff',
              size: 8 + (n.score || 0.5) * 6,
              weight: 3,
              record: n,
              tag: n.kind === 'entity' ? '@' : n.kind === 'claim' ? '#' : n.kind === 'event' ? '!' : n.kind === 'relation' ? '>' : n.kind === 'state' ? '~' : '^'
            })),
            edges: data.edges.map(e => ({
              from: e.source || e.from,
              to: e.target || e.to,
              kind: e.kind || e.label || 'relates_to'
            }))
          });
        }
      } catch (err) {
        // Fallback to procedural generation if backend trace fails or missing
        setGraphTrace({ nodes: [], edges: [] });
      }
    };
    fetchTrace();
  }, []);

  const [liveRecords, setLiveRecords] = useState([]);
  // Live write queue & records — each queue item advances monotonically until done, then moves to records
  const [queue, setQueue] = useState(() => writeQueue.map((w) => ({
    ...w,
    rate: w.op === 'WRITE' ? 0.06 : w.op === 'INDEX' ? 0.04 : w.op === 'STORE' ? 0.09 : 0
  })));
  const [graduated, setGraduated] = useState([]);
  useEffect(() => {const t = setInterval(() => setTick((v) => v + 1), 800);return () => clearInterval(t);}, []);

  // Fetch live stats + records from API
  useEffect(() => {
    let cancelled = false;
    const fetchLive = async () => {
      try {
        const stats = await window.SeamAPI.stats();
        if (!cancelled) setLiveStats(stats);
      } catch (_) { /* silent */ }
      try {
        const result = await window.SeamAPI.search('*', 20);
        if (!cancelled && result.candidates && result.candidates.length > 0) {
          const mapped = result.candidates.map((c) => {
            const r = c.record || {};
            const tag = r.kind === 'entity' ? '@' : r.kind === 'claim' ? '#' : r.kind === 'state' ? '~' : r.kind === 'event' ? '!' : r.kind === 'relation' ? '>' : '@';
            return {
              id: r.id || '?',
              tag: tag,
              kind: r.kind || 'entity',
              text: r.text || '',
              score: c.score || 0,
              age: 'live',
              status: 'indexed'
            };
          });
          setLiveRecords(mapped);
        }
      } catch (_) { /* silent — use mock data */ }
    };
    fetchLive();
    const interval = setInterval(fetchLive, 30000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);

  // Advance writing items each tick; graduate to records when progress hits 1
  useEffect(() => {
    setQueue((prev) => {
      const next = [];
      const newGraduates = [];
      let promoted = false;
      for (const item of prev) {
        if (item.status === 'writing') {
          const np = Math.min(1, item.progress + item.rate);
          if (np >= 1) {
            // Done: convert to a memory record
            newGraduates.push({
              id: `clm:${Math.floor(Math.random() * 900 + 100)}`,
              tag: item.op === 'WRITE' ? '@' : item.op === 'INDEX' ? '#' : '~',
              kind: item.op === 'WRITE' ? 'entity' : item.op === 'INDEX' ? 'claim' : 'state',
              text: `[persisted] ${item.text}`,
              score: 0.7 + Math.random() * 0.25,
              age: 'just now',
              status: 'indexed'
            });
          } else {
            next.push({ ...item, progress: np });
          }
        } else if (item.status === 'pending' && !promoted) {
          // Promote first pending to writing
          next.push({ ...item, status: 'writing', progress: 0.01, rate: item.rate || 0.05 });
          promoted = true;
        } else {
          next.push(item);
        }
      }
      if (newGraduates.length) setGraduated((g) => [...newGraduates, ...g].slice(0, 16));
      return next;
    });
  }, [tick]);

}

// ── Windows 11 taskbar ────────────────────────────────────────────────────
function WindowsTaskbar({ buttons, statusBar }) {
  const [mouseX, setMouseX] = useState(-100);
  const [hovered, setHovered] = useState(null);
  const barRef = useRef(null);

  const onMove = (e) => {
    const r = barRef.current?.getBoundingClientRect();
    if (!r) return;
    setMouseX(e.clientX - r.left);
  };

  return (
    <div ref={barRef}
    onMouseMove={onMove}
    onMouseLeave={() => {setMouseX(-100);setHovered(null);}}
    style={{
      height: 44,
      background: 'linear-gradient(180deg, rgba(8,14,32,0.85), rgba(2,9,19,0.95))',
      backdropFilter: 'blur(18px) saturate(140%)',
      WebkitBackdropFilter: 'blur(18px) saturate(140%)',
      borderTop: '1px solid rgba(127,224,255,0.18)',
      display: 'flex', alignItems: 'center',
      padding: '0 12px', flexShrink: 0,
      position: 'relative', overflow: 'hidden',
      boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.04), 0 -8px 24px rgba(0,0,0,0.4)'
    }}>

      {/* Cursor-following spotlight */}
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none',
        background: `radial-gradient(220px circle at ${mouseX}px 50%, rgba(127,224,255,0.08), transparent 70%)`,
        transition: 'background 0.08s linear'
      }} />

      {/* Centered button cluster */}
      <div style={{ flex: 1, display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 4, position: 'relative', zIndex: 1 }}>
        {buttons.map((btn) => {
          const isHover = hovered === btn.label;
          const isActive = btn.active;
          return (
            <button key={btn.label}
            onClick={btn.toggle}
            onMouseEnter={() => setHovered(btn.label)}
            onMouseLeave={() => setHovered(null)}
            title={btn.label}
            style={{
              position: 'relative',
              display: 'flex', alignItems: 'center', gap: 6,
              padding: '6px 12px', height: 32,
              background: isActive ? `${btn.color}18` : isHover ? 'rgba(255,255,255,0.04)' : 'transparent',
              border: `1px solid ${isActive ? btn.color + '40' : isHover ? 'rgba(255,255,255,0.08)' : 'transparent'}`,
              borderRadius: 6, cursor: 'pointer',
              color: isActive ? btn.color : isHover ? '#a6fcff' : '#5a7a9a',
              fontSize: 11, fontFamily: 'var(--font)',
              transition: 'all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1)',
              transform: isHover ? 'translateY(-1px)' : 'translateY(0)',
              boxShadow: isHover ? `0 4px 12px ${btn.color}30, inset 0 1px 0 rgba(255,255,255,0.06)` :
              isActive ? `inset 0 0 0 1px ${btn.color}20` : 'none'
            }}>
              {btn.icon}
              <span style={{ letterSpacing: '0.02em' }}>{btn.label}</span>

              {/* Active indicator */}
              {isActive &&
              <span style={{
                position: 'absolute', bottom: -3, left: '50%', transform: 'translateX(-50%)',
                width: 18, height: 2, borderRadius: 1,
                background: btn.color, boxShadow: `0 0 6px ${btn.color}`
              }} />
              }
              {!isActive && isHover &&
              <span style={{
                position: 'absolute', bottom: -3, left: '50%', transform: 'translateX(-50%)',
                width: 5, height: 2, borderRadius: 1,
                background: btn.color, opacity: 0.7
              }} />
              }
            </button>);

        })}
      </div>

      {/* Right: status tray */}
      <div style={{ display: 'flex', alignItems: 'center', position: 'relative', zIndex: 1 }}>
        {statusBar}
      </div>
    </div>);

}

    '__sys-pack': { name: 'seam-pack-a1b2c3.tmp', lines: [{ n: 1, t: 'comment', v: '# transient retrieved context pack' }, { n: 2, t: 'plain', v: 'budget=4096 tokens · 7 records · score-threshold=0.70' }] },
    seam_py: { name: 'seam.py', lines: [{ n: 1, t: 'comment', v: '"""SEAM top-level entry point."""' }, { n: 2, t: 'blank' }, { n: 3, t: 'import', v: 'from', rest: ' .runtime import SeamRuntime' }, { n: 4, t: 'import', v: 'from', rest: ' .cli import cli' }] }
  };

  const handleOpenFsFile = useCallback((node) => {
    const tabId = SYS_FILE_MAP[node.id];
    if (!tabId) return;
    // Register the placeholder content if not already in editorContent
    if (!editorContent[tabId] && SYS_PLACEHOLDERS[tabId]) {
      editorContent[tabId] = SYS_PLACEHOLDERS[tabId];
    }
    if (editorContent[tabId]) {
      openFile(tabId);
    }
  }, []);

  // Recursively filter system paths by query (preserves folder hierarchy + auto-expands matches)
  const filterFsTree = useCallback((nodes, query) => {
    const q = query.trim().toLowerCase();
    if (!q) return { tree: nodes, matchedIds: null };
    const matchedIds = new Set();
    const walk = (list) => {
      const out = [];
      for (const n of list) {
        if (n.type === 'folder') {
          const kids = walk(n.children || []);
          const selfMatch = n.name.toLowerCase().includes(q);
          if (kids.length > 0 || selfMatch) {
            matchedIds.add(n.id);
            out.push({ ...n, children: kids });
          }
        } else {
          if (n.name.toLowerCase().includes(q)) {
            matchedIds.add(n.id);
            out.push(n);
          }
        }
      }
      return out;
    };
    return { tree: walk(nodes), matchedIds };
  }, []);

  const [openMenu, setOpenMenu] = useState(null); // 'file' | 'edit' | 'view' | 'run' | 'help' | null
  const [maximized, setMaximized] = useState(false);
  const [hoveredWinBtn, setHoveredWinBtn] = useState(null);
  const [closeConfirm, setCloseConfirm] = useState(false);

  // Close menu on outside click
  useEffect(() => {
    if (!openMenu) return;
    const onClick = (e) => {
      if (!e.target.closest('[data-menubar]')) setOpenMenu(null);
    };
    document.addEventListener('mousedown', onClick);
    return () => document.removeEventListener('mousedown', onClick);
  }, [openMenu]);

  // File tabs
  const [openTabs, setOpenTabs] = useState(['cli', 'dashboard', 'readme']);
  const [activeTab, setActiveTab] = useState('cli');
  const [activeFile, setActiveFile] = useState('cli');

  // Editable file buffers — initialized lazily from editorContent
  const buildTextFromLines = (lines) => (lines || []).map((l) =>
  l.t === 'blank' ? '' : (l.v || '') + (l.name || '') + (l.rest || '')
  ).join('\n');
  const [fileBuffers, setFileBuffers] = useState({});
  const [saveFlash, setSaveFlash] = useState(null);
  const editorTextareaRef = useRef(null);

  const getBuffer = useCallback((tabId) => {
    if (fileBuffers[tabId]) return fileBuffers[tabId];
    const content = editorContent[tabId];
    if (!content) return null;
    const text = buildTextFromLines(content.lines);
    return { text, saved: text, dirty: false };
  }, [fileBuffers]);

  const updateBuffer = useCallback((tabId, text) => {
    setFileBuffers((prev) => {
      const existing = prev[tabId] || { saved: text, dirty: false };
      const saved = existing.saved !== undefined ? existing.saved : text;
      return { ...prev, [tabId]: { text, saved, dirty: text !== saved } };
    });
  }, []);

  const saveBuffer = useCallback((tabId) => {
    setFileBuffers((prev) => {
      const buf = prev[tabId];
      if (!buf) return prev;
      return { ...prev, [tabId]: { ...buf, saved: buf.text, dirty: false } };
    });
    const name = editorContent[tabId]?.name || tabId;
    setSaveFlash({ name, t: Date.now() });
    setTimeout(() => setSaveFlash((s) => s && s.name === name ? null : s), 1600);
  }, []);

  // Ctrl/Cmd+S global save
  useEffect(() => {
    const onKey = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
        if (editorContent[activeTab]) {
          e.preventDefault();
          saveBuffer(activeTab);
        }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [activeTab, saveBuffer]);

  // File explorer

  // Terminal
  const [termLines, setTermLines] = useState(initialTermLines);
  const [termInput, setTermInput] = useState('');
  const [termMenuOpen, setTermMenuOpen] = useState(false);
  const [termMenuIndex, setTermMenuIndex] = useState(0);
  const termEnd = useRef(null);
  const termInputRef = useRef(null);

  // Agent
  const [agentMessages, setAgentMessages] = useState(initialAgentMessages);
  const [agentInput, setAgentInput] = useState('');
  const [agentLoading, setAgentLoading] = useState(false);
  const [modelMenuOpen, setModelMenuOpen] = useState(false);
  const [selectedModel, setSelectedModel] = useState(MODEL_OPTIONS[0]);
  const [agentAttachments, setAgentAttachments] = useState([]);
  const [voiceRecording, setVoiceRecording] = useState(false);
  const [voiceDuration, setVoiceDuration] = useState(0);
  const [agentToolsOpen, setAgentToolsOpen] = useState(false);
  const [persistChat, setPersistChat] = useState(true);
  const agentEnd = useRef(null);
  const fileInputRef = useRef(null);
  const imageInputRef = useRef(null);

  // Voice recording timer
  useEffect(() => {
    if (!voiceRecording) {setVoiceDuration(0);return;}
    const t = setInterval(() => setVoiceDuration((d) => d + 1), 1000);
    return () => clearInterval(t);
  }, [voiceRecording]);

  const handleAgentFiles = (e, kind) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setAgentAttachments((prev) => [...prev, ...files.map((f) => ({
      id: 'att-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
      name: f.name,
      size: (f.size / 1024).toFixed(1) + ' KB',
      kind: kind || (f.type.startsWith('image/') ? 'image' : 'file'),
      preview: f.type.startsWith('image/') ? URL.createObjectURL(f) : null
    }))]);
    e.target.value = '';
  };

  const removeAttachment = (id) => setAgentAttachments((prev) => prev.filter((a) => a.id !== id));

  const toggleVoice = () => {
    if (voiceRecording) {
      // Stop -> attach voice clip
      const dur = voiceDuration;
      setVoiceRecording(false);
      if (dur > 0) {
        setAgentAttachments((prev) => [...prev, {
          id: 'voice-' + Date.now(),
          name: `voice-${new Date().toISOString().slice(11, 19)}.webm`,
          size: `${dur}s`,
          kind: 'voice',
          duration: dur
        }]);
      }
    } else {
      setVoiceRecording(true);
    }
  };

  useEffect(() => {
    if (termEnd.current) termEnd.current.parentElement.scrollTop = termEnd.current.parentElement.scrollHeight;
  }, [termLines]);
  useEffect(() => {
    if (agentEnd.current) agentEnd.current.parentElement.scrollTop = agentEnd.current.parentElement.scrollHeight;
  }, [agentMessages]);

  const openFile = useCallback((id) => {
    setActiveFile(id);
    setOpenTabs((prev) => prev.includes(id) ? prev : [...prev, id]);
    setActiveTab(id);
  }, []);

  const closeTab = useCallback((id, e) => {
    e.stopPropagation();
    setOpenTabs((prev) => {
      const next = prev.filter((t) => t !== id);
      if (activeTab === id && next.length > 0) setActiveTab(next[next.length - 1]);
      return next;
    });
  }, [activeTab]);

  const toggleFolder = useCallback((id) => {
    setOpenFolders((prev) => {const n = new Set(prev);n.has(id) ? n.delete(id) : n.add(id);return n;});
  }, []);
  const toggleSysFolder = useCallback((id) => {
    setSysFolders((prev) => {const n = new Set(prev);n.has(id) ? n.delete(id) : n.add(id);return n;});
  }, []);

  const navItems = [
  { id: 'explorer', icon: icons.explorer, label: 'Editor' },
  { id: 'ingest', icon: icons.ingest, label: 'Ingest' },
  { id: 'memory', icon: icons.memory, label: 'Memory' },
  { id: 'agent', icon: icons.agent, label: 'Agent' },
  { id: 'benchmark', icon: icons.benchmark, label: 'Benchmarks' }];


  // ── Terminal submit with /, ! and ? prefixes ───────────────────────────
  const handleTermSubmit = (e) => {
    e.preventDefault();
    const raw = termInput.trim();
    if (!raw) return;
    const id = termLines.length;
    const addLines = (...ls) => setTermLines((prev) => [...prev, ...ls.map((l, i) => ({ id: prev.length + i, ...l }))]);

    if (raw === '/') {
      setTermMenuOpen(true);
      setTermInput('');
      return;
    }

    // ── /search <query> — live API search ──────────────────────────────
    if (raw.startsWith('/search ')) {
      const query = raw.slice(8).trim().replace(/^["']|["']$/g, '');
      addLines(
        { kind: 'prompt', text: raw },
        { kind: 'info', text: `[search] querying: "${query}"...` }
      );
      (async () => {
        try {
          const result = await window.SeamAPI.search(query, 5);
          const candidates = result.candidates || [];
          if (candidates.length === 0) {
            addLines({ kind: 'warn', text: '[search] no results found' });
          } else {
            addLines({ kind: 'ok', text: `[ok] ${candidates.length} records retrieved` });
            candidates.forEach((c) => {
              const rec = c.record || {};
              const score = (c.score * 100).toFixed(0);
              addLines({ kind: 'plain', text: `  ${rec.id || '?'}  ${(rec.text || '').slice(0, 80)}  [${score}%]` });
            });
          }
        } catch (err) {
          addLines({ kind: 'error', text: `[error] search failed: ${err.message}` });
        }
      })();
    }
    // ── /doctor — live health + stats ─────────────────────────────────
    else if (raw.startsWith('/doctor')) {
      addLines(
        { kind: 'prompt', text: raw },
        { kind: 'info', text: '[doctor] running health checks...' }
      );
      (async () => {
        try {
          const health = await window.SeamAPI.health();
          addLines({ kind: 'ok', text: `[ok] API status: ${health.status || 'ok'}` });
          try {
            const stats = await window.SeamAPI.stats();
            addLines(
              { kind: 'ok', text: `[ok] SQLite store: ${stats.store_path || 'connected'}` },
              { kind: 'ok', text: `[ok] total records: ${stats.total_records != null ? stats.total_records.toLocaleString() : 'unknown'}` }
            );
            // Show any additional stats keys
            Object.entries(stats).forEach(([k, v]) => {
              if (k !== 'total_records' && k !== 'store_path') {
                addLines({ kind: 'info', text: `[info] ${k}: ${typeof v === 'object' ? JSON.stringify(v) : v}` });
              }
            });
          } catch (statsErr) {
            addLines({ kind: 'warn', text: `[warn] stats unavailable: ${statsErr.message}` });
          }
        } catch (err) {
          addLines({ kind: 'error', text: `[error] health check failed: ${err.message}` });
          addLines({ kind: 'warn', text: '[warn] is the SEAM REST API running? (seam serve)' });
        }
      })();
    }
    // ── /retrieve <query> — live context pack ────────────────────────
    else if (raw.startsWith('/retrieve ')) {
      const query = raw.slice(10).trim().replace(/^["']|["']$/g, '');
      addLines(
        { kind: 'prompt', text: raw },
        { kind: 'info', text: `[retrieve] building context pack for: "${query}"...` }
      );
      (async () => {
        try {
          const result = await window.SeamAPI.context(query, 5, null, 'general', 512, 'mix');
          const candidates = result.candidates || [];
          const pack = result.pack || {};
          addLines(
            { kind: 'info', text: `[info] ${candidates.length} candidates found` },
            { kind: 'ok', text: `[ok] context pack: ${candidates.length} entries, ${pack.total_tokens || '?'} tokens` }
          );
          candidates.slice(0, 5).forEach((c) => {
            const rec = c.record || {};

        baseUrl: m.baseUrl,
        envKey: m.envKey,
        apiKey: apiKey,

        <div style={{
          width: agentWidth, flexShrink: 0, overflow: 'hidden',
          transition: 'width 0.22s cubic-bezier(0.4,0,0.2,1)',
          borderLeft: agentOpen ? '1px solid rgba(47,99,255,0.15)' : 'none',
          background: '#030d20', display: 'flex', flexDirection: 'column'
        }}>
          {agentOpen &&
          <>
              {/* Agent header with model switcher */}
              <div style={{ height: 36, display: 'flex', alignItems: 'center', padding: '0 10px', gap: 6, borderBottom: '1px solid rgba(47,99,255,0.12)', background: '#020913', flexShrink: 0, position: 'relative' }}>
                <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#7efdb9', boxShadow: '0 0 6px #7efdb9', flexShrink: 0 }} />
                <span style={{ color: '#7fe0ff', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em' }}>SEAM Agent</span>
                <div style={{ flex: 1 }} />
                {/* Model picker button */}
                <button onClick={() => setModelMenuOpen((v) => !v)} style={{
                display: 'flex', alignItems: 'center', gap: 4, padding: '2px 7px',
                background: 'rgba(79,140,251,0.08)', border: `1px solid ${selectedModel.color}40`,
                borderRadius: 4, cursor: 'pointer', fontSize: 10, fontFamily: 'var(--font)',
                color: selectedModel.color
              }}>
                  <span>{selectedModel.label}</span>
                  <span style={{ opacity: 0.5, fontSize: 8 }}>▾</span>
                </button>
                <button onClick={() => setAgentOpen(false)} style={{ background: 'none', border: 'none', color: '#274063', cursor: 'pointer', fontSize: 16, lineHeight: 1, marginLeft: 2 }}>×</button>

                {/* Model dropdown */}
                {modelMenuOpen &&
              <div style={{
                position: 'absolute', top: 38, right: 30, zIndex: 60,
                background: '#030d20', border: '1px solid rgba(79,140,251,0.25)',
                borderRadius: 8, padding: '6px 0', minWidth: 220,
                boxShadow: '0 8px 32px rgba(0,0,0,0.5)'
              }}>
                    {['Anthropic', 'OpenAI', 'Google', 'Ollama'].map((provider) => {
                  const group = MODEL_OPTIONS.filter((m) => m.provider === provider);
                  return (
                    <div key={provider}>
                          <div style={{ padding: '4px 12px', fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#274063' }}>{provider}</div>
                          {group.map((m) =>
                      <div key={m.id} onClick={() => {setSelectedModel(m);setModelMenuOpen(false);}}
                      style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '5px 14px', cursor: 'pointer', fontSize: 12, background: selectedModel.id === m.id ? 'rgba(79,140,251,0.1)' : 'transparent' }}
                      onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(79,140,251,0.07)'}
                      onMouseLeave={(e) => e.currentTarget.style.background = selectedModel.id === m.id ? 'rgba(79,140,251,0.1)' : 'transparent'}>

                              <span style={{ width: 5, height: 5, borderRadius: '50%', background: m.color, flexShrink: 0 }} />
                              <span style={{ color: selectedModel.id === m.id ? '#a6fcff' : '#8090b0' }}>{m.label}</span>
                            </div>
                      )}
                        </div>);

                })}
                  </div>
              }
              </div>

              <div style={{ flex: 1, overflowY: 'auto', padding: '12px 12px 8px' }}>
                {agentMessages.map((m) => <AgentMsg key={m.id} msg={m} />)}
                {agentLoading &&
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: '#4f8cfb', fontSize: 12 }}>
                    <span style={{ animation: 'pulse 1.2s ease-in-out infinite' }}>●</span>
                    <span style={{ color: selectedModel.color, fontSize: 11 }}>{selectedModel.label} thinking...</span>
                  </div>
              }
                <div ref={agentEnd} />
              </div>

              <form onSubmit={handleAgentSubmit} style={{ padding: '10px', borderTop: '1px solid rgba(47,99,255,0.12)', flexShrink: 0 }}>

                {/* Hidden file inputs */}
                <input ref={fileInputRef} type="file" multiple onChange={(e) => handleAgentFiles(e, 'file')} style={{ display: 'none' }} />
                <input ref={imageInputRef} type="file" accept="image/*" multiple onChange={(e) => handleAgentFiles(e, 'image')} style={{ display: 'none' }} />

                {/* Attachment chips */}
                {agentAttachments.length > 0 &&
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 6 }}>
                    {agentAttachments.map((a) => {
                  const kindColors = { file: '#7fe0ff', image: '#d391ff', voice: '#7efdb9' };
                  const c = kindColors[a.kind] || '#7fe0ff';
                  return (
                    <div key={a.id} style={{
                      display: 'flex', alignItems: 'center', gap: 5, padding: '3px 4px 3px 6px',
                      background: 'rgba(8,19,42,0.9)', border: `1px solid ${c}40`, borderRadius: 4,
                      fontSize: 10, color: c, maxWidth: 180
                    }}>
                          {a.preview ?
                      <img src={a.preview} alt="" style={{ width: 16, height: 16, objectFit: 'cover', borderRadius: 2 }} /> :

                      <span style={{ fontSize: 11 }}>
                              {a.kind === 'voice' ? '🎙' : a.kind === 'image' ? '▢' : '◰'}
                            </span>
                      }
                          <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{a.name}</span>
                          <span style={{ color: '#274063', fontSize: 9 }}>{a.size}</span>
                          <button type="button" onClick={() => removeAttachment(a.id)} style={{ background: 'none', border: 'none', color: '#274063', cursor: 'pointer', fontSize: 12, lineHeight: 1, padding: 0 }}>×</button>
                        </div>);

                })}
                  </div>
              }

                {/* Voice recording banner */}
                {voiceRecording &&
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, padding: '6px 10px', background: 'rgba(255,107,107,0.08)', border: '1px solid rgba(255,107,107,0.3)', borderRadius: 6 }}>
                    <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#ff6b6b', boxShadow: '0 0 6px #ff6b6b', animation: 'pulse 1s ease-in-out infinite', flexShrink: 0 }} />
                    <span style={{ fontSize: 11, color: '#ff6b6b' }}>Recording</span>
                    <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 2 }}>
                      {Array.from({ length: 14 }).map((_, i) =>
                  <span key={i} style={{ flex: 1, height: 3 + (Math.sin((voiceDuration + i) * 0.7) + 1) * 5, background: '#ff6b6b', borderRadius: 1, opacity: 0.7, transition: 'height 0.2s' }} />
                  )}
                    </div>
                    <span style={{ fontSize: 10, color: '#ff6b6b', fontFamily: 'var(--font)' }}>
                      {String(Math.floor(voiceDuration / 60)).padStart(2, '0')}:{String(voiceDuration % 60).padStart(2, '0')}
                    </span>
                    <button type="button" onClick={() => setVoiceRecording(false)} style={{ background: 'none', border: 'none', color: '#5a7a9a', cursor: 'pointer', fontSize: 10, fontFamily: 'var(--font)' }}>cancel</button>
                  </div>
              }

                <div style={{ display: 'flex', gap: 6, alignItems: 'flex-end', background: 'rgba(8,19,42,0.9)', border: '1px solid rgba(79,140,251,0.25)', borderRadius: 8, padding: '6px 8px' }}>
                  <textarea
                  value={agentInput}
                  onChange={(e) => setAgentInput(e.target.value)}
                  onKeyDown={(e) => {if (e.key === 'Enter' && !e.shiftKey) {e.preventDefault();handleAgentSubmit(e);}}}
                  placeholder="Ask SEAM agent..."
                  rows={2}
                  style={{ flex: 1, background: 'transparent', border: 'none', outline: 'none', color: '#a6fcff', fontSize: 12, fontFamily: 'var(--font)', resize: 'none', lineHeight: 1.5, caretColor: '#7efdb9', minWidth: 0 }} />

                  <button type="submit" disabled={agentLoading || !agentInput.trim() && agentAttachments.length === 0} style={{
                  background: agentInput.trim() || agentAttachments.length ? 'rgba(79,140,251,0.2)' : 'transparent',
                  border: '1px solid rgba(79,140,251,0.3)', borderRadius: 6, padding: '5px 10px',
                  color: agentInput.trim() || agentAttachments.length ? '#7fe0ff' : '#274063',
                  cursor: agentInput.trim() || agentAttachments.length ? 'pointer' : 'default', fontSize: 12, fontFamily: 'var(--font)', transition: 'all 0.15s', flexShrink: 0
                }}>↑</button>
                </div>

                {/* Action toolbar */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 2, marginTop: 6, position: 'relative' }}>
                  {[
                { id: 'attach', title: 'Attach file', color: '#7fe0ff', onClick: () => fileInputRef.current?.click(),
                  icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" /></svg> },
                { id: 'image', title: 'Add image', color: '#d391ff', onClick: () => imageInputRef.current?.click(),
                  icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" strokeWidth="1.7" /><circle cx="9" cy="9" r="2" stroke="currentColor" strokeWidth="1.7" /><path d="M21 15l-5-5L5 21" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" /></svg> },
                { id: 'voice', title: voiceRecording ? 'Stop recording' : 'Voice message', color: voiceRecording ? '#ff6b6b' : '#7efdb9', onClick: toggleVoice, active: voiceRecording,
                  icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="12" rx="3" stroke="currentColor" strokeWidth="1.7" /><path d="M5 10v2a7 7 0 0 0 14 0v-2M12 19v3M8 22h8" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg> },
                { id: 'mention', title: 'Mention memory record', color: '#9b6cff', onClick: () => setAgentInput((v) => v + '@'),
                  icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="currentColor" strokeWidth="1.7" /><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg> },
                { id: 'slash', title: 'Slash command', color: '#f4d676', onClick: () => setAgentInput((v) => '/' + v),
                  icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M16 4L8 20" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg> },
                { id: 'tools', title: 'More tools', color: '#66b8ff', onClick: () => setAgentToolsOpen((v) => !v),
                  icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.5" fill="currentColor" /><circle cx="12" cy="12" r="1.5" fill="currentColor" /><circle cx="19" cy="12" r="1.5" fill="currentColor" /></svg> }].
                map((b) =>
                <button key={b.id} type="button" title={b.title} onClick={b.onClick} style={{
                  width: 26, height: 26, display: 'flex', alignItems: 'center', justifyContent: 'center',
                  background: b.active ? `${b.color}15` : 'transparent',
                  border: `1px solid ${b.active ? b.color + '50' : 'transparent'}`,
                  borderRadius: 5, cursor: 'pointer',
                  color: b.active ? b.color : '#4f6888', transition: 'all 0.12s'
                }}
                onMouseEnter={(e) => {e.currentTarget.style.color = b.color;e.currentTarget.style.background = `${b.color}10`;}}
                onMouseLeave={(e) => {if (!b.active) {e.currentTarget.style.color = '#4f6888';e.currentTarget.style.background = 'transparent';}}}>
                      {b.icon}
                    </button>
                )}

                  <div style={{ flex: 1 }} />
                  <label title="Remember this chat turn in MIRL memory" style={{
                    display: 'flex', alignItems: 'center', gap: 4, fontSize: 9,
                    color: persistChat ? '#7efdb9' : '#5a7a9a', cursor: 'pointer', userSelect: 'none'
                  }}>
                    <input type="checkbox" checked={persistChat} onChange={(e) => setPersistChat(e.target.checked)}
                    style={{ width: 12, height: 12, margin: 0, accentColor: '#7efdb9' }} />
                    remember
                  </label>
                  <span style={{ fontSize: 9, color: '#274063' }}>↵ send · ⇧↵ newline</span>

                  {/* Tools dropdown */}
                  {agentToolsOpen &&
                <div style={{
                  position: 'absolute', bottom: 30, left: 0, zIndex: 60,
                  background: '#030d20', border: '1px solid rgba(79,140,251,0.25)',
                  borderRadius: 8, padding: '4px 0', minWidth: 220,
                  boxShadow: '0 8px 32px rgba(0,0,0,0.5)'
                }}>
                      <div style={{ padding: '4px 12px 6px', fontSize: 9, color: '#4f8cfb', textTransform: 'uppercase', letterSpacing: '0.1em', borderBottom: '1px solid rgba(47,99,255,0.1)' }}>
                        Agent Tools
                      </div>
                      {[
                  { icon: '⌖', label: 'Pin to MIRL memory', desc: 'persist this thread', c: '#7efdb9' },
                  { icon: '⎘', label: 'Inject context pack', desc: 'attach retrieved records', c: '#7fe0ff' },
                  { icon: '⚡', label: 'Run as terminal command', desc: 'execute in shell', c: '#f4d676' },
                  { icon: '⟳', label: 'Regenerate last reply', desc: 'rerun with new seed', c: '#9b6cff' },
                  { icon: '⌫', label: 'Clear conversation', desc: 'reset agent state', c: '#ff6b6b' },
                  { icon: '⤓', label: 'Export transcript', desc: 'save as .md', c: '#66b8ff' }].
                  map((t) =>
                  <div key={t.label} onClick={() => setAgentToolsOpen(false)}
                  style={{ display: 'flex', gap: 8, padding: '6px 12px', cursor: 'pointer', alignItems: 'center' }}
                  onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(79,140,251,0.07)'}
                  onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                          <span style={{ color: t.c, fontSize: 13, width: 14, textAlign: 'center' }}>{t.icon}</span>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontSize: 11, color: '#bfefff' }}>{t.label}</div>
                            <div style={{ fontSize: 9, color: '#274063' }}>{t.desc}</div>
                          </div>
                        </div>
                  )}
                    </div>
                }
                </div>
              </form>
            </>
          }
        </div>
      </div>

      {/* ── Bottom toolbar — Windows 11 taskbar style ─────────────────── */}
      <WindowsTaskbar
        buttons={[
        { label: 'Terminal', active: terminalOpen, toggle: () => setTerminalOpen((v) => !v), color: '#7fe0ff',
          icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="4,6 10,12 4,18" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /><line x1="12" y1="18" x2="20" y2="18" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg> },
        { label: 'Agent', active: agentOpen, toggle: () => setAgentOpen((v) => !v), color: '#9b6cff',
          icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" /></svg> },
        { label: 'Explorer', active: explorerOpen, toggle: () => setExplorerOpen((v) => !v), color: '#4f8cfb',
          icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.7" /><rect x="13" y="3" width="8" height="5" rx="1.5" stroke="currentColor" strokeWidth="1.7" /><rect x="13" y="11" width="8" height="10" rx="1.5" stroke="currentColor" strokeWidth="1.7" /></svg> },
        { label: 'Memory', active: false, toggle: () => handleNavClick('memory'), color: '#d391ff',
          icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="8" width="18" height="8" rx="2" stroke="currentColor" strokeWidth="1.7" /><path d="M7 8V5M12 8V5M17 8V5M7 16v3M12 16v3M17 16v3" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg> },
        { label: 'Benchmarks', active: false, toggle: () => handleNavClick('benchmark'), color: '#f4d676',
          icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="3,17 8,12 12,14 17,8 21,10" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" /></svg> },
        { label: 'Settings', active: settingsOpen, toggle: () => setSettingsOpen((v) => !v), color: '#7efdb9',
          icon: <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" strokeWidth="1.7" /><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg> }]
        }
        statusBar={<StatusBar />} />


      {/* Tweaks panel */}
      <TweaksPanel>
        <window.TweakSection title="Layout">
          <window.TweakToggle label="Show metrics in explorer" tweakKey="showMetrics" />
          <window.TweakSlider label="Explorer width" tweakKey="explorerWidth" min={200} max={420} step={10} />
          <window.TweakSlider label="Agent panel width" tweakKey="agentWidth" min={220} max={480} step={10} />
          <window.TweakSlider label="Terminal height" tweakKey="terminalHeight" min={120} max={400} step={10} />
        </window.TweakSection>
        <window.TweakSection title="Accent">
          <window.TweakColor label="Accent color" tweakKey="accentColor" />
        </window.TweakSection>
      </TweaksPanel>

      <style>{`
        @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #274063; }
        button:focus { outline: none; }
        textarea::placeholder, input::placeholder { color: #274063; }
      `}</style>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
